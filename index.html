<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OGM · Controle de Processos</title>
<style>
  :root{
    --azul:#0056EF; --azul2:#0a3aa8; --azul-esc:#0a2350;
    --verde:#20BF40; --amarelo:#EDA704; --laranja:#F26522; --vermelho:#E23B2E;
    --bg:#eef1f8; --card:#ffffff; --linha:#e2e7f3; --texto:#1b2334; --muted:#6b7690;
    --grad:linear-gradient(90deg,var(--verde),var(--amarelo),var(--laranja));
    --sombra:0 1px 3px rgba(20,35,80,.08),0 1px 2px rgba(20,35,80,.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--texto);font-size:14px;line-height:1.45}
  a{color:var(--azul)}
  /* header */
  header{background:#fff;border-bottom:1px solid var(--linha);box-shadow:var(--sombra)}
  .headbar{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:12px 20px}
  .logo{width:44px;height:44px;object-fit:contain;object-position:center;flex:0 0 auto;display:block;background:none;border:0;padding:0}
  .htxt h1{font-size:18px;margin:0;letter-spacing:.2px}
  .htxt .sub{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
  .gradbar{height:4px;background:var(--grad)}
  /* nav */
  nav{background:var(--azul-esc)}
  .navwrap{max-width:1240px;margin:0 auto;display:flex;gap:2px;padding:0 12px;flex-wrap:wrap}
  nav button{background:transparent;border:0;color:#c9d6f5;font-size:13.5px;font-weight:600;
    padding:12px 16px;cursor:pointer;border-bottom:3px solid transparent}
  nav button:hover{color:#fff}
  nav button.on{color:#fff;border-bottom-color:var(--amarelo)}
  /* layout */
  main{max-width:1240px;margin:0 auto;padding:22px 20px 60px}
  .card{background:var(--card);border:1px solid var(--linha);border-radius:12px;box-shadow:var(--sombra)}
  .pad{padding:18px}
  h2.sec{font-size:16px;margin:0 0 2px}
  .lead{color:var(--muted);font-size:13px;margin:0 0 16px}
  /* botoes */
  .btn{border:0;border-radius:9px;padding:10px 16px;font-weight:700;font-size:13.5px;cursor:pointer}
  .btn.primary{background:var(--azul);color:#fff}
  .btn.primary:hover{background:var(--azul2)}
  .btn.ghost{background:#fff;color:var(--azul);border:1px solid #cfdcff}
  .btn.ghost:hover{background:#f2f6ff}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:7px}
  .btn.danger{background:#fff;color:var(--vermelho);border:1px solid #f3c9c5}
  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px}
  .kpi{padding:16px 18px;position:relative;overflow:hidden}
  .kpi .n{font-size:30px;font-weight:800;line-height:1}
  .kpi .l{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:6px}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--azul)}
  .kpi.g::before{background:var(--verde)} .kpi.y::before{background:var(--amarelo)}
  .kpi.o::before{background:var(--laranja)} .kpi.r::before{background:var(--vermelho)}
  .kpi.b::before{background:#7A5CF0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:820px){.grid2{grid-template-columns:1fr}}
  .bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .bar-row .lbl{width:44%;color:var(--texto)}
  .bar-track{flex:1;height:9px;background:#eef1f8;border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;background:var(--azul);border-radius:6px}
  .bar-row .val{width:32px;text-align:right;font-weight:700;color:var(--muted)}
  /* tabela */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{padding:9px 11px;border:1px solid var(--linha);border-radius:8px;font-size:13px;background:#fff}
  .toolbar input[type=search]{min-width:220px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--linha);vertical-align:top}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:#f7f9fe;position:sticky;top:0}
  tbody tr:hover{background:#f7f9ff;cursor:pointer}
  .tblwrap{overflow:auto;max-height:65vh;border-radius:10px;border:1px solid var(--linha)}
  /* chips */
  .chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap}
  .chip.blue{background:#e5edff;color:#1a49c7}
  .chip.green{background:#e2f7e6;color:#1a8f33}
  .chip.amber{background:#fdf1d6;color:#9a6a00}
  .chip.orange{background:#ffe9dc;color:#c34e15}
  .chip.red{background:#fde3e0;color:#c02a1f}
  .chip.gray{background:#eceff5;color:#5a6480}
  .prazo-ok{color:#1a8f33;font-weight:700}
  .prazo-venc{color:var(--vermelho);font-weight:700}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(15,25,55,.5);display:flex;align-items:flex-start;
    justify-content:center;padding:26px 14px;overflow:auto;z-index:50}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:920px;box-shadow:0 24px 60px rgba(10,25,70,.35)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--linha)}
  .modal-head h3{margin:0;font-size:16px}
  .modal-head .x{border:0;background:#f1f4fb;border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;color:#5a6480}
  .modal-body{padding:20px 22px;max-height:74vh;overflow:auto}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 22px;border-top:1px solid var(--linha);background:#fafbfe;border-radius:0 0 14px 14px}
  /* form */
  fieldset{border:1px solid var(--linha);border-radius:10px;padding:14px 16px 4px;margin:0 0 18px}
  legend{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--azul);padding:0 8px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
  .frow.one{grid-template-columns:1fr}
  .frow.three{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:680px){.frow,.frow.three{grid-template-columns:1fr}}
  label.f{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px;color:#374260}
  label.f .hint{display:block;font-weight:500;color:var(--muted);font-size:11.5px;margin-top:2px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid #d5ddee;border-radius:8px;font-size:13.5px;
    font-family:inherit;background:#fff;color:var(--texto)}
  input:focus,select:focus,textarea:focus{outline:2px solid #bcd0ff;border-color:var(--azul)}
  textarea{min-height:70px;resize:vertical}
  .check{display:flex;gap:9px;align-items:flex-start;font-size:13px;font-weight:600;color:#374260}
  .check input{width:auto;margin-top:2px}
  .check .hint{display:block;font-weight:500;color:var(--muted);font-size:11.5px;margin-top:2px}
  .ods-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px;margin-top:12px}
  .ods-tile{display:flex;align-items:center;gap:8px;font-size:11.5px;line-height:1.25;color:#374260}
  .ods-tile .sq{width:30px;height:30px;border-radius:6px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
  .odsbox{display:flex;flex-wrap:wrap;gap:6px;max-height:150px;overflow:auto;border:1px solid var(--linha);border-radius:8px;padding:8px}
  .odsopt{font-size:11.5px;padding:5px 9px;border:1px solid #d5ddee;border-radius:16px;cursor:pointer;user-select:none}
  .odsopt.on{background:var(--azul);color:#fff;border-color:var(--azul)}
  .warn{background:#fde3e0;color:#b02a1f;border:1px solid #f3c9c5;border-radius:8px;padding:8px 11px;font-size:12.5px;font-weight:600;margin-top:6px;display:none}
  .warn.show{display:block}
  .desc-sub{background:#f5f8ff;border:1px solid #dbe6ff;border-radius:8px;padding:9px 11px;font-size:12.5px;color:#3a4870;margin-top:-4px;margin-bottom:12px;display:none}
  .desc-sub.show{display:block}
  .hidden{display:none!important}
  /* detalhe / recomendacoes */
  .rec{border:1px solid var(--linha);border-radius:10px;padding:14px;margin-bottom:14px}
  .rec h4{margin:0 0 6px;font-size:14px}
  .trat{border-left:3px solid var(--verde);padding:8px 12px;margin:8px 0;background:#f7fbf8;border-radius:0 8px 8px 0;font-size:13px}
  .trat .meta{font-size:11.5px;color:var(--muted);margin-top:3px}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--azul-esc);color:#fff;
    padding:12px 20px;border-radius:10px;font-weight:600;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:99;opacity:0;transition:.25s}
  .toast.show{opacity:1}
  /* setup */
  .setup{max-width:720px;margin:40px auto}
  .setup ol{line-height:1.7} .setup code{background:#eef1f8;padding:2px 6px;border-radius:5px}
  .aux-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .aux-tabs button{border:1px solid var(--linha);background:#fff;border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;color:#374260}
  .aux-tabs button.on{background:var(--azul);color:#fff;border-color:var(--azul)}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  textarea.tall{min-height:140px}
  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;margin-bottom:18px}
  .chart-card{padding:16px 18px}
  .chart-card h3{font-size:14px;margin:0 0 2px}
  .chart-card .cap{color:var(--muted);font-size:12px;margin:0 0 12px}
  .chart-box{position:relative;height:240px}
  .chart-box.tallbox{height:300px}
  .sec-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--azul);
    margin:6px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--linha)}
  #mapa{height:380px;border-radius:10px;border:1px solid var(--linha);z-index:1}
  .leaflet-container{font:inherit}
  .kpi .sub2{font-size:11px;color:var(--muted);margin-top:3px}
</style>
</head>

ia de movimentação, demora na análise, processos paralisados, pendências de manifestação, descumprimento de prazos, ausência de resposta, encaminhamentos, acesso aos autos e demais aspectos relativos à gestão processual.", "ods": 16}, {"area": "Cultura e Turismo", "subarea": "Equipamentos culturais", "descricao": "Manifestações relacionadas aos equipamentos culturais públicos, abrangendo bibliotecas, museus, teatros, centros culturais, memoriais, galerias, salas de exposição e demais espaços destinados à preservação, produção, difusão e fruição da cultura, incluindo seu funcionamento, manutenção, conservação, utilização e acesso.", "ods": 11}, {"area": "Cultura e Turismo", "subarea": "Patrimônio histórico e cultural", "descricao": "Manifestações relacionadas ao patrimônio histórico e cultural do Município, abrangendo bens materiais e imateriais, preservação, proteção, conservação, restauração, valorização, tombamento, inventário, registro e demais ações voltadas à salvaguarda da memória e da identidade cultural.", "ods": 11}, {"area": "Cultura e Turismo", "subarea": "Turismo e promoção turística", "descricao": "Manifestações relacionadas ao turismo e à promoção turística do Município, abrangendo atrativos turísticos, informações ao visitante, sinalização turística, roteiros, centros de atendimento ao turista, promoção e divulgação de destinos, eventos de interesse turístico e demais ações voltadas ao desenvolvimento da atividade turística.", "ods": 8}, {"area": "Desenvolvimento agrícola", "subarea": "Feira do produtor", "descricao": "Manifestações relacionadas às feiras do produtor, abrangendo cadastramento e autorização de feirantes, funcionamento, organização, infraestrutura, fiscalização, comercialização de produtos, horários, locais de realização e demais questões relativas às atividades desenvolvidas nas feiras.", "ods": 2}, {"area": "Desenvolvimento agrícola", "subarea": "Hortas comunitárias", "descricao": "Manifestações relacionadas às hortas comunitárias, abrangendo sua implantação, manutenção, funcionamento, utilização, apoio técnico, cessão de áreas, participação da comunidade e demais ações voltadas à produção comunitária de alimentos e à agricultura urbana. Fazem parte da Política Municipal de Agricultura Urbana e Periurbana.", "ods": 2}, {"area": "Desenvolvimento agrícola", "subarea": "Nota do Produtor Rural", "descricao": "Manifestações relacionadas à Nota Fiscal de Produtor Rural, abrangendo emissão, cancelamento, substituição, regularização, orientação, cadastro, atualização de dados e demais procedimentos administrativos vinculados ao documento fiscal do produtor rural.", "ods": 2}, {"area": "Desenvolvimento agrícola", "subarea": "Patrulha mecanizada", "descricao": "Manifestações relacionadas aos serviços de patrulha mecanizada, abrangendo disponibilização de tratores, implementos e máquinas agrícolas, agendamento, filas de atendimento, execução dos serviços, prazos e demais ações de apoio à produção rural.", "ods": 2}, {"area": "Desenvolvimento econômico", "subarea": "Empreendedorismo", "descricao": "Manifestações relacionadas às políticas de empreendedorismo, abrangendo os serviços prestados pela Sala do Empreendedor, incentivo à criação, formalização e desenvolvimento de negócios, apoio a microempreendedores individuais (MEI), micro e pequenas empresas, orientação empresarial, capacitação, inovação e demais ações voltadas ao fortalecimento da atividade econômica local.", "ods": 8}, {"area": "Desenvolvimento econômico", "subarea": "Feiras livres e Economia Solidária", "descricao": "Manifestações relacionadas às feiras livres e à economia solidária, compreendida como o conjunto de atividades econômicas baseadas na cooperação, autogestão, comércio justo e geração de trabalho e renda, voltadas ao desenvolvimento econômico e à inclusão produtiva. Abrange a organização, funcionamento, participação, credenciamento, infraestrutura e comercialização em feiras livres, feiras do produtor, empreendimentos econômicos solidários, food trucks, food bikes e demais modalidades de comércio itinerante apoiadas pela Administração Pública Municipal.", "ods": 8}, {"area": "Desenvolvimento econômico", "subarea": "Parque industrial", "descricao": "Manifestações relacionadas ao parque industrial do Município, compreendido como o conjunto de áreas destinadas à instalação e ao desenvolvimento de atividades industriais, abrangendo implantação, expansão, infraestrutura, ocupação, regularização, incentivos, funcionamento e demais aspectos relacionados ao desenvolvimento industrial municipal.", "ods": 9}, {"area": "Desenvolvimento econômico", "subarea": "Intermediação de mão de obra", "descricao": "Manifestações relacionadas aos serviços de intermediação de mão de obra, compreendidos como as ações de aproximação entre trabalhadores e empregadores, abrangendo divulgação de vagas de emprego, encaminhamento para processos seletivos, captação de vagas, atendimento ao trabalhador e demais serviços prestados pela rede pública de emprego.", "ods": 8}, {"area": "Gestão de manifestações", "subarea": "Não habilitada - Aberto por pessoa que não é responsável pelo menor", "descricao": "Manifestações registradas em nome de criança ou adolescente por pessoa que não detenha sua responsabilidade legal ou não possua legitimidade para representá-lo perante a Administração Pública.", "ods": 16}, {"area": "Gestão de manifestações", "subarea": "Não habilitada - Competência legal de órgãos externos", "descricao": "Manifestações cujo objeto seja de competência legal exclusiva de órgão ou entidade externa à Administração Pública Municipal de Londrina, impossibilitando sua atuação pela Ouvidoria-Geral do Município.", "ods": 16}, {"area": "Gestão de manifestações", "subarea": "Não habilitada - Recurso LAI inabilitado, conforme art. 18 Dec. Mun. 712/2015", "descricao": "Utilizar exclusivamente em recursos previstos na Lei de Acesso à Informação (LAI) quando não atenderem aos requisitos de habilitação previstos no art. 18 do Decreto Municipal nº 712/2015, ficando o recurso inabilitado para análise de mérito.", "ods": 16}, {"area": "Gestão de manifestações", "subarea": "Não habilitada - Dados pessoais inconsistentes e manifestação incompleta", "descricao": "Manifestações cadastradas com dados pessoais inconsistentes, incompletos ou insuficientes para identificação do usuário, concomitantemente à ausência de informações mínimas que permitam identificar o fato ou o objeto da demanda, impossibilitando sua análise e o prosseguimento do atendimento.", "ods": 16}, {"area": "Gestão de manifestações", "subarea": "Não habilitada - Dentro do prazo contido na Carta de Serviços", "descricao": "Manifestações registradas antes do decurso do prazo estabelecido na Carta de Serviços ao Usuário para a prestação do serviço, não sendo possível caracterizar atraso ou descumprimento do prazo informado pela Administração Pública.", "ods": 16}, {"area": "Gestão de manifestações", "subarea": "Não habilitada - Manifestação genérica", "descricao": "Pedidos de Acesso à Informação formulados de maneira genérica, sem informações mínimas que permitam identificar o objeto da solicitação, quando, após tentativa de solicitação de complementação por e-mail, não houver resposta do requerente ou não for possível realizar o contato.", "ods": 16}, {"area": "Gestão de manifestações", "subarea": "Não habilitada - Processo duplicado", "descricao": "Manifestações registradas em duplicidade, cujo conteúdo seja idêntico ou substancialmente semelhante a outra manifestação já cadastrada pelo mesmo usuário, referente ao mesmo fato, assunto e período.", "ods": 16}, {"area": "Gestão de manifestações", "subarea": "Não habilitada - Uso em desconformidade com o inc. I art. 8º Lei 13460/2017", "descricao": "Manifestações cujo conteúdo seja incompatível com o dever de urbanidade e respeito, contendo ofensas, xingamentos, insultos, linguagem ofensiva, ameaças ou outras expressões desrespeitosas dirigidas a agentes públicos, terceiros ou à Administração Pública.", "ods": 16}, {"area": "Gestão Orçamentária e Financeira", "subarea": "Dívida ativa e execução fiscal", "descricao": "Manifestações relacionadas à dívida ativa e à execução fiscal, compreendidas como os procedimentos administrativos e judiciais destinados à cobrança de créditos devidos ao Município e não pagos no prazo legal, abrangendo inscrição em dívida ativa, consultas, emissão de guias, parcelamentos, regularização de débitos, cobrança judicial, execução fiscal e demais procedimentos relativos à recuperação de créditos municipais.", "ods": 16}, {"area": "Gestão Orçamentária e Financeira", "subarea": "Impostos e taxas", "descricao": "Manifestações relacionadas aos impostos, taxas e demais tributos de competência do Município, abrangendo lançamento, cobrança, cálculo, isenções, imunidades, revisão, restituição, emissão de guias, pagamento, parcelamento e demais aspectos relativos à administração tributária municipal.", "ods": 16}, {"area": "Gestão Orçamentária e Financeira", "subarea": "Orçamento público", "descricao": "Manifestações relacionadas ao orçamento público e à gestão de recursos públicos, abrangendo planejamento, alocação, execução, contingenciamento, utilização, destinação, aplicação, repasses, despesas, receitas e demais aspectos relativos à gestão orçamentária e financeira da Administração Pública Municipal.", "ods": 16}, {"area": "Gestão Orçamentária e Financeira", "subarea": "Precatórios", "descricao": "Manifestações relacionadas aos precatórios, compreendidos como requisições de pagamento expedidas pelo Poder Judiciário para quitação de valores devidos pelo Município em decorrência de decisão judicial definitiva, abrangendo consultas, ordem cronológica, pagamento, atualização de valores, habilitação de sucessores, cessão de créditos e demais procedimentos relativos ao cumprimento dessas obrigações.", "ods": 16}, {"area": "Habitação", "subarea": "Cadastro habitacional", "descricao": "Manifestações relacionadas ao cadastro habitacional do Município, abrangendo inscrição, atualização cadastral, consulta da situação, habilitação, classificação, convocação e demais procedimentos necessários à participação em programas habitacionais.", "ods": 11}, {"area": "Habitação", "subarea": "Financiamento habitacional", "descricao": "Manifestações relacionadas ao financiamento habitacional, abrangendo contratação, prestações, emissão de boletos, renegociação, quitação, amortização, inadimplência e demais aspectos relativos aos contratos de financiamento habitacional.", "ods": 11}, {"area": "Habitação", "subarea": "Programas habitacionais", "descricao": "Manifestações relacionadas aos programas habitacionais do Município, abrangendo critérios de participação, seleção de beneficiários, contemplação, empreendimentos habitacionais, entrega de unidades, acompanhamento dos programas e demais ações voltadas à implementação da política habitacional.", "ods": 11}, {"area": "Habitação", "subarea": "Regularização imobiliária", "descricao": "Manifestações relacionadas à regularização imobiliária de unidades habitacionais, abrangendo escrituração, transferência de titularidade, averbação, emissão e regularização de documentos, atualização cadastral do imóvel e demais procedimentos administrativos relativos à situação jurídica e documental do imóvel.", "ods": 11}, {"area": "Infraestrutura", "subarea": "Conservação de vias e passeios públicos", "descricao": "Manifestações relacionadas à conservação da infraestrutura viária, abrangendo pavimentação, tapa-buracos, recapeamento, calçadas, passeios públicos, meio-fio, guias, sarjetas e demais elementos destinados à circulação segura de veículos e pedestres.", "ods": 9}, {"area": "Infraestrutura", "subarea": "Drenagem urbana", "descricao": "Manifestações relacionadas ao sistema de drenagem urbana, abrangendo galerias pluviais, bocas de lobo, bueiros, canais, sarjetas, alagamentos, enxurradas, erosão, desobstrução, manutenção e demais intervenções destinadas ao escoamento adequado das águas pluviais.", "ods": 9}, {"area": "Infraestrutura", "subarea": "Equipamentos públicos de lazer", "descricao": "Manifestações relacionadas aos equipamentos públicos destinados ao lazer e à recreação, abrangendo parques infantis, playgrounds, academias ao ar livre, quadras recreativas, mobiliário de lazer e demais estruturas voltadas ao convívio, à recreação e ao bem-estar da população, incluindo implantação, manutenção, conservação e utilização.", "ods": 9}, {"area": "Infraestrutura", "subarea": "Estradas rurais", "descricao": "Manifestações relacionadas à infraestrutura e à manutenção das estradas rurais, abrangendo conservação, pavimentação, recapeamento, cascalhamento, patrolamento, drenagem, pontes, pontilhões, bueiros, trafegabilidade e demais intervenções destinadas a garantir as condições de circulação e acesso na zona rural.", "ods": 9}, {"area": "Infraestrutura", "subarea": "Iluminação pública", "descricao": "Manifestações relacionadas ao serviço de iluminação pública, abrangendo instalação, manutenção, substituição e reparo de luminárias, postes, braços de iluminação, relés, expansão da rede de iluminação e demais aspectos relativos ao funcionamento da iluminação em vias e espaços públicos.", "ods": 9}, {"area": "Infraestrutura", "subarea": "Obras públicas", "descricao": "Manifestações relacionadas às obras públicas de competência da Administração Pública Municipal, abrangendo construção, ampliação, reforma, revitalização, manutenção, paralisação, execução, fiscalização e demais intervenções realizadas em bens e espaços públicos.", "ods": 9}, {"area": "Integridade e Ambiente de Trabalho", "subarea": "Assédio moral", "descricao": "Manifestações relacionadas à práticas envolvendo condutas abusivas, reiteradas ou sistemáticas que exponham a pessoa a situações humilhantes, constrangedoras, ofensivas ou degradantes, com potencial de afetar sua dignidade, integridade psíquica ou condições de trabalho.", "ods": 16}, {"area": "Integridade e Ambiente de Trabalho", "subarea": "Assédio sexual", "descricao": "Manifestações relacionadas à práticas envolvendo condutas de natureza sexual indesejadas, por palavras, gestos, contatos físicos, insinuações, propostas, constrangimentos ou outras ações que violem a dignidade, a liberdade sexual ou criem ambiente intimidatório, hostil, humilhante ou ofensivo.", "ods": 16}, {"area": "Integridade e Ambiente de Trabalho", "subarea": "Conduta do agente público", "descricao": "Manifestações relacionadas a supostas irregularidades envolvendo grave descumprimento de deveres funcionais, infrações éticas, abuso de autoridade, favorecimento indevido, conflito de interesses ou outras condutas praticadas no exercício das atribuições que possam ensejar apuração pela Administração Pública.", "ods": 16}, {"area": "Integridade e Ambiente de Trabalho", "subarea": "Discriminação", "descricao": "Manifestações relacionadas a atos envolvendo tratamento diferenciado, constrangimento, exclusão ou qualquer distinção baseada em raça, cor, etnia, origem, idade, deficiência, religião, identidade de gênero, orientação sexual, condição socioeconômica ou qualquer outra forma de discriminação vedada pela legislação.", "ods": 16}, {"area": "Integridade e Ambiente de Trabalho", "subarea": "Postura do agente público", "descricao": "Manifestações relacionadas ao atendimento inadequado, falta de urbanidade, desrespeito, tratamento incompatível com os princípios da Administração Pública, falta de cordialidade, negligência, omissão ou outras condutas que afetem a qualidade do atendimento ao usuário, sem indícios de irregularidade funcional.", "ods": 16}, {"area": "Integridade e Ambiente de Trabalho", "subarea": "Ambiente de trabalho", "descricao": "Manifestações relacionadas às condições do ambiente de trabalho, abrangendo infraestrutura, organização, clima organizacional, segurança, ergonomia, condições ambientais, relacionamento interpessoal, disponibilidade de recursos e demais fatores que possam impactar o desempenho das atividades, a saúde, o bem-estar e a qualidade do ambiente laboral.", "ods": 16}, {"area": "Administração Institucional", "subarea": "Quadro de Pessoal", "descricao": "Manifestações relacionadas ao quadro de pessoal da Administração Pública Municipal, abrangendo dimensionamento de equipes, déficit ou excesso de servidores, lotação, distribuição da força de trabalho, reposição de pessoal, criação ou extinção de cargos e demais aspectos relativos ao planejamento e à gestão do quadro funcional.", "ods": 16}, {"area": "Meio ambiente", "subarea": "Arborização urbana", "descricao": "Manifestações relacionadas à arborização urbana e ao Viveiro Municipal, abrangendo produção e fornecimento de mudas, plantio, poda, supressão, transplante, manejo, conservação, monitoramento, avaliação de riscos, quedas de árvores e galhos, controle fitossanitário, incluindo ocorrências envolvendo cupins, formigas e outras pragas associadas à arborização, bem como demais ações de competência da Administração Pública Municipal.", "ods": 15}, {"area": "Meio ambiente", "subarea": "Áreas verdes", "descricao": "Manifestações relacionadas às áreas verdes públicas, abrangendo parques, praças, bosques, fundos de vale, jardins, conservação, limpeza, manutenção, revitalização, utilização, proteção e demais ações voltadas à preservação e ao manejo desses espaços.", "ods": 15}, {"area": "Meio ambiente", "subarea": "Licenciamento ambiental", "descricao": "Manifestações relacionadas ao licenciamento ambiental, procedimento administrativo destinado a autorizar a localização, instalação, ampliação e operação de empreendimentos ou atividades utilizadoras de recursos ambientais ou potencialmente poluidoras, abrangendo requerimento, análise, emissão, renovação, alteração, regularização, fiscalização do cumprimento das condicionantes e demais procedimentos de competência municipal.", "ods": 15}, {"area": "Meio ambiente", "subarea": "Resíduos sólidos", "descricao": "Manifestações relacionadas à gestão de resíduos sólidos, abrangendo coleta, transporte, destinação, tratamento, disposição final, descarte irregular, coleta seletiva, reciclagem, PEVs e demais ações de gerenciamento de resíduos de competência da Administração Pública Municipal.", "ods": 15}, {"area": "Política assistêncial", "subarea": "Acolhimento institucional", "descricao": "Manifestações relacionadas ao acolhimento institucional de pessoas em situação de vulnerabilidade ou risco social, abrangendo serviços de acolhimento para crianças e adolescentes, pessoas idosas, mulheres, pessoas com deficiência, pessoas em situação de rua e demais públicos atendidos pela política de assistência social, incluindo acesso, permanência, funcionamento e qualidade dos serviços.", "ods": 10}, {"area": "Política assistêncial", "subarea": "Benefícios socioassistenciais", "descricao": "Manifestações relacionadas aos benefícios socioassistenciais, abrangendo Cadastro Único, benefícios eventuais, auxílio-natalidade, auxílio-funeral, benefícios destinados ao enfrentamento de vulnerabilidades temporárias, concessão, manutenção, revisão, suspensão, orientação e demais aspectos relativos aos benefícios previstos na política de assistência social.", "ods": 10}, {"area": "Política assistêncial", "subarea": "Direitos de grupos vulneráveis", "descricao": "Manifestações relacionadas à promoção, proteção ou garantia de direitos de grupos vulneráveis, abrangendo crianças e adolescentes, pessoas idosas, mulheres, pessoas com deficiência, pessoas em situação de rua, migrantes, refugiados, povos indígenas, população cigana e demais grupos com proteção específica prevista na legislação.", "ods": 10}, {"area": "Política assistêncial", "subarea": "Segurança alimentar", "descricao": "Manifestações relacionadas à política de segurança alimentar e nutricional, abrangendo acesso a alimentos, distribuição de cestas básicas, restaurantes populares, cozinhas comunitárias, bancos de alimentos, educação alimentar e nutricional e demais ações destinadas à promoção do direito humano à alimentação adequada.", "ods": 2}, {"area": "Política educacional", "subarea": "Mediação no ambiente escolar", "descricao": "Manifestações relacionadas à mediação no ambiente escolar, abrangendo ações de acompanhamento, orientação e intervenção pedagógica ou socioeducativa destinadas a promover a aprendizagem, a convivência harmoniosa, a resolução de conflitos, o desenvolvimento dos estudantes e o adequado relacionamento entre os membros da comunidade escolar.", "ods": 4}, {"area": "Política educacional", "subarea": "Diretrizes e funcionamento escolar", "descricao": "Manifestações relacionadas às diretrizes e ao funcionamento das instituições de ensino da rede pública municipal, abrangendo normas, orientações e procedimentos que disciplinam a organização pedagógica, administrativa e disciplinar, bem como a aplicação da legislação educacional e demais aspectos relativos ao funcionamento escolar.", "ods": 4}, {"area": "Política educacional", "subarea": "Educação especial", "descricao": "Manifestações relacionadas à educação especial na perspectiva da educação inclusiva, abrangendo atendimento educacional especializado, acessibilidade, recursos de apoio, profissionais de apoio escolar, adaptações, inclusão, atendimento aos estudantes público-alvo da educação especial e demais ações voltadas à garantia do direito à educação.", "ods": 4}, {"area": "Política educacional", "subarea": "Material escolar e uniforme", "descricao": "Manifestações relacionadas ao fornecimento de material escolar e uniformes aos estudantes da rede pública municipal de ensino, abrangendo aquisição, distribuição, entrega, qualidade, reposição, quantitativos, prazos e demais aspectos referentes a esses itens.", "ods": 4}, {"area": "Política educacional", "subarea": "Merenda escolar", "descricao": "Manifestações relacionadas à alimentação escolar oferecida aos estudantes da rede pública municipal de ensino, abrangendo qualidade, quantidade, cardápio, fornecimento, preparo, distribuição, condições de higiene, atendimento às necessidades alimentares específicas e demais aspectos relativos à execução do programa de alimentação escolar.", "ods": 4}, {"area": "Política educacional", "subarea": "Transporte escolar", "descricao": "Manifestações relacionadas ao transporte escolar, abrangendo disponibilidade, rotas, horários, pontos de embarque e desembarque, segurança, acessibilidade, condições dos veículos, conduta dos prestadores do serviço e demais aspectos relativos à prestação do transporte escolar.", "ods": 4}, {"area": "Política educacional", "subarea": "Gestão de vagas", "descricao": "Manifestações relacionadas à gestão de vagas na rede municipal de ensino, abrangendo disponibilidade, oferta, distribuição, remanejamento, lista de espera, critérios de priorização, matrícula, transferência e demais procedimentos relativos ao acesso e à ocupação de vagas nas unidades educacionais. Considerar Central de Vagas.", "ods": 4}, {"area": "Política funerária", "subarea": "Exumação e transporte de corpos", "descricao": "Manifestações relacionadas à exumação, remoção e transporte de corpos ou restos mortais, abrangendo autorizações, procedimentos, prazos, documentação, traslados entre cemitérios e o transporte proveniente de outras localidades, bem como demais questões administrativas de competência da Administração Pública Municipal.", "ods": 11}, {"area": "Política funerária", "subarea": "Túmulos e jazigos", "descricao": "Manifestações relacionadas a túmulos e jazigos em cemitérios públicos municipais, abrangendo concessão, regularização, transferência, conservação, manutenção, identificação, exumação, ocupação, utilização e demais procedimentos administrativos relacionados.", "ods": 11}, {"area": "Proteção animal", "subarea": "Animais silvestres", "descricao": "Manifestações relacionadas aos animais silvestres, compreendidos como aqueles pertencentes às espécies nativas ou migratórias da fauna brasileira, abrangendo resgate, recolhimento, aparecimento em áreas urbanas, manejo, destinação, orientação à população e demais ações de competência ou articulação do Município com os órgãos ambientais competentes.", "ods": 15}, {"area": "Proteção animal", "subarea": "Banco de ração", "descricao": "Manifestações relacionadas ao Programa Banco de Ração, abrangendo a captação e distribuição de ração, medicamentos, utensílios e demais insumos destinados à proteção e ao bem-estar animal, bem como o credenciamento, acompanhamento e atendimento de entidades de proteção animal, protetores independentes e famílias beneficiárias do programa.", "ods": 15}, {"area": "Proteção animal", "subarea": "Castração de animais", "descricao": "Manifestações relacionadas aos serviços de castração de animais, abrangendo programas de esterilização, unidades móveis de castração, inscrições, agendamentos, critérios de atendimento, locais, cronogramas, realização dos procedimentos e demais ações voltadas ao controle populacional e ao bem-estar animal.", "ods": 15}, {"area": "Proteção animal", "subarea": "Maus tratos aos animais", "descricao": "Manifestações relacionadas à suspeita ou ocorrência de maus-tratos contra animais, envolvendo ações ou omissões que provoquem sofrimento, abuso, violência, negligência, abandono ou outras condutas vedadas pela legislação de proteção animal.", "ods": 15}, {"area": "Proteção animal", "subarea": "Recolhimento de animais de grande porte", "descricao": "Manifestações relacionadas à solicitação de recolhimento de animais de grande porte soltos, abandonados ou em situação de risco em vias públicas ou outros locais, quando houver atuação ou competência da Administração Pública Municipal.", "ods": 15}, {"area": "Relacionamento com o usuário", "subarea": "Agendamento", "descricao": "Manifestações relacionadas ao agendamento de atendimentos, serviços, consultas, procedimentos ou demais atividades da Administração Pública Municipal, abrangendo disponibilidade de vagas, marcação, confirmação, remarcação, cancelamento, prazos e demais aspectos relativos ao processo de agendamento.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Atendimento por canais digitais", "descricao": "Manifestações relacionadas ao atendimento prestado por canais digitais da Administração Pública Municipal, abrangendo WhatsApp, e-mail, chat, redes sociais e outros meios eletrônicos de comunicação, incluindo a percepção do usuário quanto à qualidade do atendimento, cordialidade, clareza das informações, tempo de resposta e resolutividade.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Atendimento presencial", "descricao": "Manifestações relacionadas ao atendimento presencial prestado por agentes públicos, abrangendo a percepção do usuário quanto à qualidade do atendimento, acolhimento, cordialidade, clareza das informações, resolutividade e demais aspectos da interação durante o atendimento presencial.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Atendimento telefônico", "descricao": "Manifestações relacionadas ao atendimento telefônico prestado pela Administração Pública Municipal, abrangendo qualidade do atendimento, tempo de espera, disponibilidade do serviço, cordialidade, orientações prestadas, funcionamento dos canais telefônicos e demais aspectos relativos ao atendimento ao usuário.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Comunicação institucional", "descricao": "Manifestações relacionadas à comunicação institucional da Administração Pública Municipal, abrangendo o conteúdo, a divulgação, a clareza e a qualidade das informações veiculadas no site oficial, redes sociais públicas, campanhas institucionais, materiais informativos e demais canais oficiais de comunicação com o usuário.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Reconhecimento individual", "descricao": "Manifestações de elogio direcionadas à atuação de agente público específico ou identificável, em reconhecimento à qualidade do atendimento, profissionalismo, dedicação, cordialidade ou demais condutas positivas no exercício de suas atribuições.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Reconhecimento institucional", "descricao": "Manifestações relacionadas à atuação de equipes, setores ou unidades da Administração Pública, quando o reconhecimento, elogio ou avaliação se referir ao desempenho coletivo, sem identificação de agente público específico.", "ods": 16}, {"area": "Saúde", "subarea": "Atendimento domiciliar", "descricao": "Manifestações relacionadas à atenção domiciliar prestada pela rede pública de saúde, abrangendo visitas domiciliares, atendimento multiprofissional, acompanhamento de pacientes acamados ou com dificuldade de locomoção, agendamento, realização, periodicidade e demais aspectos relativos à assistência em domicílio.", "ods": 3}, {"area": "Saúde", "subarea": "Atendimento multiprofissional", "descricao": "Manifestações relacionadas ao atendimento multiprofissional na rede pública de saúde, compreendido como a assistência prestada por equipe composta por profissionais de diferentes áreas da saúde, abrangendo atendimentos de psicologia, fonoaudiologia, terapia ocupacional, fisioterapia, nutrição, serviço social e demais especialidades multiprofissionais, incluindo acolhimento, avaliação, acompanhamento, encaminhamentos, fluxos de atendimento e demais aspectos relativos aos serviços prestados.", "ods": 3}, {"area": "Saúde", "subarea": "Atendimento de urgência e emergência", "descricao": "Manifestações relacionadas ao atendimento de urgência e emergência na rede pública de saúde, compreendido como a assistência destinada a situações que exigem avaliação e intervenção imediata ou em curto prazo, abrangendo acolhimento, classificação de risco, tempo de espera, atendimento médico e multiprofissional, encaminhamentos, estabilização do paciente e demais aspectos relativos aos serviços de urgência e emergência. Considerar UPAs e PAs.", "ods": 3}, {"area": "Saúde", "subarea": "Cirurgias eletivas", "descricao": "Manifestações relacionadas às cirurgias eletivas, compreendidas como procedimentos cirúrgicos programados, sem caráter de urgência ou emergência, abrangendo indicação cirúrgica, inclusão e posição na fila de espera, regulação, agendamento, remarcação, cancelamento, prazos, realização do procedimento e demais aspectos relativos ao atendimento cirúrgico na rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Consulta médica", "descricao": "A consulta com especialista corresponde ao atendimento realizado por médico ou outro profissional de saúde com especialização em área específica, destinado à avaliação clínica, diagnóstico, tratamento, acompanhamento ou orientação, geralmente mediante encaminhamento da atenção básica ou de outro serviço de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Dietas e insumos de saúde", "descricao": "Manifestações relacionadas ao fornecimento de insumos de saúde, abrangendo fraldas, dietas e fórmulas nutricionais, suplementos alimentares, materiais para higiene e cuidados pessoais, sondas, bolsas coletoras e demais insumos destinados ao tratamento, à reabilitação e aos cuidados dos usuários da rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Dispositivos auxiliares de locomoção", "descricao": "Manifestações relacionadas ao fornecimento, manutenção, substituição, adaptação, avaliação e demais aspectos relativos a órteses, próteses e meios auxiliares de locomoção, tais como cadeiras de rodas, cadeiras de banho, andadores, muletas, bengalas e outros dispositivos destinados à promoção da mobilidade, autonomia e reabilitação dos usuários do Sistema Único de Saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Dispositivos médicos", "descricao": "Manifestações relacionadas ao fornecimento, manutenção, substituição, adaptação e demais aspectos relativos a dispositivos médicos e terapêuticos, tais como aparelhos auditivos, aparelhos para monitorização contínua da glicose, canetas de insulina e outros dispositivos destinados ao tratamento, monitoramento ou reabilitação dos usuários da rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Exames", "descricao": "Manifestações relacionadas à solicitação, agendamento, realização, remarcação, disponibilidade, resultados, entrega de laudos, prazos, regulação e demais aspectos relativos aos exames ofertados pela rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Medicamentos", "descricao": "Demanda de farmácias de UBS ou Farmácia Municipal.", "ods": 3}, {"area": "Saúde", "subarea": "Prontuário médico", "descricao": "Manifestações relacionadas ao acesso à documentação em saúde, abrangendo prontuários médicos, certificados e atestados de vacinação, solicitação de cópias, disponibilização de documentos, retificação, integridade, guarda, sigilo, compartilhamento de informações e demais aspectos relativos aos registros de atendimento dos usuários da rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Receita médica", "descricao": "Manifestações relacionadas à emissão de receitas médicas, abrangendo inconsistências na prescrição, recusa, atraso ou prazo para emissão, renovação, retificação e demais aspectos relativos à prescrição de medicamentos, insumos e produtos para a saúde no âmbito da rede pública municipal.", "ods": 3}, {"area": "Saúde", "subarea": "Transporte domiciliar", "descricao": "Manifestações relacionadas ao transporte domiciliar de pacientes, abrangendo solicitação, agendamento, disponibilidade, elegibilidade, pontualidade, condições do transporte, acessibilidade, transporte para consultas, exames, tratamentos e demais aspectos relativos à prestação do serviço.", "ods": 3}, {"area": "Saúde", "subarea": "Transporte móvel de urgência", "descricao": "Manifestações relacionadas ao transporte móvel de urgência e emergência, abrangendo solicitação, atendimento, tempo de resposta, regulação, remoção de pacientes, disponibilidade de ambulâncias, qualidade do atendimento e demais aspectos relativos à prestação do serviço de atendimento pré-hospitalar móvel.", "ods": 3}, {"area": "Saúde", "subarea": "Vacinação", "descricao": "Manifestações relacionadas aos serviços de vacinação, abrangendo disponibilidade de vacinas, campanhas de imunização, locais e horários de atendimento, aplicação de vacinas, registro vacinal, atualização da caderneta de vacinação e demais aspectos relativos à imunização.", "ods": 3}, {"area": "Segurança pública", "subarea": "Defesa Civil", "descricao": "Manifestações relacionadas às ações de proteção e defesa civil, abrangendo prevenção, mitigação, preparação, resposta e recuperação em situações de desastres naturais ou tecnológicos, vistorias, emissão de laudos, interdições, avaliação de riscos e demais ações de competência da Defesa Civil Municipal.", "ods": 16}, {"area": "Segurança pública", "subarea": "Patrulhamento", "descricao": "Manifestações relacionadas ao patrulhamento preventivo realizado pelos órgãos de segurança pública municipal, abrangendo rondas, presença ostensiva, atendimento a ocorrências, intensificação do patrulhamento e demais ações voltadas à proteção da população, do patrimônio público e da ordem pública.", "ods": 16}, {"area": "Serviços urbanos", "subarea": "Capina e Roçagem", "descricao": "Manifestações relacionadas aos serviços de capina e roçagem em áreas públicas, abrangendo controle da vegetação, limpeza de terrenos, praças, canteiros, vias públicas e demais espaços públicos, visando à conservação, segurança e manutenção urbana.", "ods": 11}, {"area": "Serviços urbanos", "subarea": "Coleta de resíduos domiciliares", "descricao": "Manifestações relacionadas ao serviço de coleta de resíduos domiciliares, abrangendo dias e horários de coleta, roteiros, atendimento às localidades, acondicionamento dos resíduos, regularidade da prestação do serviço e demais aspectos relativos à coleta convencional de resíduos domiciliares.", "ods": 11}, {"area": "Serviços urbanos", "subarea": "Coleta seletiva", "descricao": "Manifestações relacionadas ao serviço de coleta seletiva, abrangendo coleta de resíduos recicláveis, dias e horários de coleta, roteiros, atendimento às localidades, acondicionamento dos materiais e demais aspectos relativos à prestação do serviço.", "ods": 12}, {"area": "Serviços urbanos", "subarea": "Manutenção de espaços públicos", "descricao": "Manifestações relacionadas à manutenção e conservação de espaços públicos, abrangendo praças, parques, jardins, áreas de convivência e demais espaços de uso coletivo, incluindo limpeza, reparos, conservação e demais serviços destinados à preservação desses locais.", "ods": 11}, {"area": "Serviços urbanos", "subarea": "Manutenção de próprios públicos", "descricao": "Manifestações relacionadas à manutenção e conservação dos próprios públicos municipais, abrangendo edificações, instalações, estruturas, equipamentos prediais e demais serviços destinados à preservação e ao adequado funcionamento dos imóveis públicos.", "ods": 11}, {"area": "Serviços urbanos", "subarea": "Paisagismo e jardinagem", "descricao": "Manifestações relacionadas aos serviços de paisagismo e jardinagem em áreas públicas, abrangendo implantação, manutenção, conservação e revitalização de jardins, canteiros, floreiras, gramados, espécies ornamentais e demais elementos paisagísticos.", "ods": 11}, {"area": "Trânsito e Mobilidade", "subarea": "Acessibilidade", "descricao": "Manifestações relacionadas à acessibilidade e à eliminação de barreiras no sistema de mobilidade urbana, abrangendo calçadas, travessias, rampas, pisos táteis, sinalização acessível, pontos e terminais de transporte, vagas de estacionamento, mobiliário urbano e demais condições que assegurem o deslocamento seguro e autônomo das pessoas, especialmente daquelas com deficiência ou mobilidade reduzida.", "ods": 11}, {"area": "Trânsito e Mobilidade", "subarea": "Credenciais de estacionamento", "descricao": "Manifestações relacionadas à emissão, renovação, segunda via, cancelamento, utilização, fiscalização e demais procedimentos referentes às credenciais de estacionamento destinadas às pessoas com deficiência, pessoas idosas e demais beneficiários previstos na legislação.", "ods": 11}, {"area": "Trânsito e Mobilidade", "subarea": "Mobilidade urbana", "descricao": "Manifestações relacionadas à mobilidade urbana, abrangendo a circulação de pedestres, patinetes, ciclistas e veículos, bem como a infraestrutura, os equipamentos e as políticas públicas destinadas a promover deslocamentos seguros, acessíveis, eficientes e sustentáveis no Município.", "ods": 11}, {"area": "Trânsito e Mobilidade", "subarea": "Sinalização viária", "descricao": "Manifestações relacionadas à sinalização viária horizontal, vertical, semafórica e dispositivos auxiliares de sinalização, abrangendo implantação, manutenção, adequação, alteração, remoção e demais intervenções destinadas à orientação e segurança no trânsito.", "ods": 11}, {"area": "Trânsito e Mobilidade", "subarea": "Transporte público", "descricao": "Manifestações relacionadas aos serviços de transporte público coletivo, abrangendo itinerários, horários, frequência, pontualidade, veículos, acessibilidade, pontos e terminais, atendimento aos usuários, integração, tarifas e demais aspectos relativos à prestação do serviço.", "ods": 11}, {"area": "Vida funcional do agente público", "subarea": "Ingresso e provimento", "descricao": "Manifestações relacionadas ao ingresso e provimento de cargos públicos, compreendidos como os procedimentos destinados ao acesso e ao preenchimento de cargos na Administração Pública Municipal, abrangendo concursos públicos, nomeação, posse, exercício, convocação de candidatos, aproveitamento, reintegração, recondução, reversão, readaptação e demais formas de provimento previstas na legislação.", "ods": 16}, {"area": "Vida funcional do agente público", "subarea": "Direitos e vantagens", "descricao": "Manifestações relacionadas aos d   url=url.replace(/\/rest\/v1\/?$/,"").replace(/\/+$/,"");
  if(!url || !key){renderSetup();return;}
  sb = supabase.createClient(url, key);
  await loadAux();
  bindNav();
  go("painel");
}
function bindNav(){
  $("#nav").addEventListener("click",e=>{const b=e.target.closest("button[data-v]");if(!b)return;go(b.dataset.v);});
}
function go(v){
  view=v;
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  if(v==="painel")renderPainel();
  else if(v==="processos")renderProcessos();
  else if(v==="recomendacoes")renderRecomendacoes();
  else if(v==="auxiliares")renderAuxiliares();
}

/* dados auxiliares: usa o banco; se a tabela estiver vazia, cai no SEED (em memória) */
async function loadAux(){
  const map = {
    taxonomia:"aux_taxonomia", ods:"aux_ods", lai_motivos:"aux_lai_motivos",
    servidores:"aux_servidores", unidades:"aux_unidades", orgaos:"aux_orgaos",
    tipos_demanda:"aux_tipos_demanda", tipos_documento:"aux_tipos_documento", status:"aux_status",
    predios:"aux_predios", tipos_tratativa:"aux_tipos_tratativa"
  };
  for(const [k,tbl] of Object.entries(map)){
    try{
      const {data,error}=await sb.from(tbl).select("*");
      if(error)throw error;
      if(data && data.length){
        if(k==="tipos_demanda"||k==="tipos_documento"||k==="status"||k==="tipos_tratativa") AUX[k]=data.map(r=>r.nome);
        else AUX[k]=data;
      }else AUX[k]=fallback(k);
    }catch(e){AUX[k]=fallback(k);}
  }
}
function fallback(k){
  if(k==="taxonomia")return SEED.taxonomia;
  if(k==="ods")return SEED.ods;
  if(k==="lai_motivos")return SEED.lai_motivos;
  if(k==="servidores")return SEED.servidores;
  if(k==="unidades")return SEED.unidades;
  if(k==="orgaos")return SEED.orgaos;
  if(k==="tipos_demanda")return SEED.tipos_demanda;
  if(k==="tipos_documento")return SEED.tipos_documento;
  if(k==="status")return SEED.status;
  if(k==="predios")return SEED.predios||[];
  if(k==="tipos_tratativa")return SEED.tipos_tratativa||[];
  return [];
}

async function loadProcessos(){
  const {data,error}=await sb.from("processos").select("*").order("created_at",{ascending:false});
  PROCESSOS = error?[]:(data||[]);
}

function agrupar(arr,campo){
  const m={};arr.forEach(x=>{const k=x[campo]||"(sem)";m[k]=(m[k]||0)+1;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function concluido(x){return ["Concluído","Arquivado"].includes(x.status);}
function dataConclusao(x){return x.doc_data_saida||(x.updated_at?String(x.updated_at).slice(0,10):null);}
function diasEntre(a,b){if(!a||!b)return null;const d=(new Date(b)-new Date(a))/86400000;return isFinite(d)?d:null;}
function ultimosMeses(n){const arr=[];const base=new Date();for(let i=n-1;i>=0;i--){const dd=new Date(base.getFullYear(),base.getMonth()-i,1);arr.push(dd.toISOString().slice(0,7));}return arr;}

function mkChart(id,type,labels,data,opts){
  opts=opts||{};
  const el=document.getElementById(id);
  if(!el||typeof Chart==='undefined')return;
  const colors = type==='doughnut'? labels.map((_,i)=>PAL[i%PAL.length]) : (opts.colors||opts.color||PAL[0]);
  PAINEL_CHARTS.push(new Chart(el,{
    type,
    data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'#fff',borderWidth:type==='doughnut'?2:0,borderRadius:type==='bar'?5:0}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:opts.horizontal?'y':'x',
      plugins:{legend:{display:type==='doughnut',position:'right',labels:{boxWidth:12,font:{size:11}}}},
      scales:type==='doughnut'?{}:{x:{grid:{display:!opts.horizontal},ticks:{font:{size:10},autoSkip:false}},
        y:{beginAtZero:true,grid:{display:!!opts.horizontal},ticks:{precision:0,font:{size:11}}}}}
  }));
}

    if(filtro.ext==="nao" && p.tramitacao_ext)return false;
    if(filtro.servidor && p.servidor!==filtro.servidor)return false;
    if(filtro.orgao && !String(p.orgao_demandado||"").includes(filtro.orgao))return false;
    if(filtro.q){const q=filtro.q.toLowerCase();
      const blob=[p.numero_sei,p.orgao_demandado,p.servidor,p.area,p.subarea,p.bairro,p.endereco,p.observacoes].join(" ").toLowerCase();
      if(!blob.includes(q))return false;}

  });
  tb.innerHTML=rows.length?rows.map(rowProc).join(""):`<tr><td colspan="9"><div class="empty">Nenhum processo encontrado. Clique em <b>+ Novo processo</b>.</div></td></tr>`;
