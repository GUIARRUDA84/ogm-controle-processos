<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OGM · Controle de Processos</title>
<style>
  :root{
    --azul:#0056EF; --azul2:#0a3aa8; --azul-esc:#0a2350;
    --verde:#20BF40; --amarelo:#EDA704; --laranja:#F26522; --vermelho:#E23B2E;
    --bg:#eef1f8; --card:#ffffff; --linha:#e2e7f3; --texto:#1b2334; --muted:#6b7690;
    --grad:linear-gradient(90deg,var(--verde),var(--amarelo),var(--laranja));
    --sombra:0 1px 3px rgba(20,35,80,.08),0 1px 2px rgba(20,35,80,.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--texto);font-size:14px;line-height:1.45}
  a{color:var(--azul)}
  /* header */
  header{background:#fff;border-bottom:1px solid var(--linha);box-shadow:var(--sombra)}
  .headbar{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:12px 20px}
  .logo{width:46px;height:46px;min-width:46px;flex:0 0 auto;display:inline-block;vertical-align:middle}
  .htxt h1{font-size:18px;margin:0;letter-spacing:.2px}
  .htxt .sub{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
  .gradbar{height:4px;background:var(--grad)}
  /* nav */
  nav{background:var(--azul-esc)}
  .navwrap{max-width:1240px;margin:0 auto;display:flex;gap:2px;padding:0 12px;flex-wrap:wrap}
  nav button{background:transparent;border:0;color:#c9d6f5;font-size:13.5px;font-weight:600;
    padding:12px 16px;cursor:pointer;border-bottom:3px solid transparent}
  nav button:hover{color:#fff}
  nav button.on{color:#fff;border-bottom-color:var(--amarelo)}
  /* layout */
  main{max-width:1240px;margin:0 auto;padding:22px 20px 60px}
  .card{background:var(--card);border:1px solid var(--linha);border-radius:12px;box-shadow:var(--sombra)}
  .pad{padding:18px}
  h2.sec{font-size:16px;margin:0 0 2px}
  .lead{color:var(--muted);font-size:13px;margin:0 0 16px}
  /* botoes */
  .btn{border:0;border-radius:9px;padding:10px 16px;font-weight:700;font-size:13.5px;cursor:pointer}
  .btn.primary{background:var(--azul);color:#fff}
  .btn.primary:hover{background:var(--azul2)}
  .btn.ghost{background:#fff;color:var(--azul);border:1px solid #cfdcff}
  .btn.ghost:hover{background:#f2f6ff}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:7px}
  .btn.danger{background:#fff;color:var(--vermelho);border:1px solid #f3c9c5}
  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px}
  .kpi{padding:16px 18px;position:relative;overflow:hidden}
  .kpi .n{font-size:30px;font-weight:800;line-height:1}
  .kpi .l{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:6px}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--azul)}
  .kpi.g::before{background:var(--verde)} .kpi.y::before{background:var(--amarelo)}
  .kpi.o::before{background:var(--laranja)} .kpi.r::before{background:var(--vermelho)}
  .kpi.b::before{background:#7A5CF0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:820px){.grid2{grid-template-columns:1fr}}
  .bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .bar-row .lbl{width:44%;color:var(--texto)}
  .bar-track{flex:1;height:9px;background:#eef1f8;border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;background:var(--azul);border-radius:6px}
  .bar-row .val{width:32px;text-align:right;font-weight:700;color:var(--muted)}
  /* tabela */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{padding:9px 11px;border:1px solid var(--linha);border-radius:8px;font-size:13px;background:#fff}
  .toolbar input[type=search]{min-width:220px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--linha);vertical-align:top}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:#f7f9fe;position:sticky;top:0}
  tbody tr:hover{background:#f7f9ff;cursor:pointer}
  .tblwrap{overflow:auto;max-height:65vh;border-radius:10px;border:1px solid var(--linha)}
  /* chips */
  .chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap}
  .chip.blue{background:#e5edff;color:#1a49c7}
  .chip.green{background:#e2f7e6;color:#1a8f33}
  .chip.amber{background:#fdf1d6;color:#9a6a00}
  .chip.orange{background:#ffe9dc;color:#c34e15}
  .chip.red{background:#fde3e0;color:#c02a1f}
  .chip.gray{background:#eceff5;color:#5a6480}
  .prazo-ok{color:#1a8f33;font-weight:700}
  .prazo-venc{color:var(--vermelho);font-weight:700}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(15,25,55,.5);display:flex;align-items:flex-start;
    justify-content:center;padding:26px 14px;overflow:auto;z-index:50}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:920px;box-shadow:0 24px 60px rgba(10,25,70,.35)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--linha)}
  .modal-head h3{margin:0;font-size:16px}
  .modal-head .x{border:0;background:#f1f4fb;border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;color:#5a6480}
  .modal-body{padding:20px 22px;max-height:74vh;overflow:auto}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 22px;border-top:1px solid var(--linha);background:#fafbfe;border-radius:0 0 14px 14px}
  /* form */
  fieldset{border:1px solid var(--linha);border-radius:10px;padding:14px 16px 4px;margin:0 0 18px}
  legend{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--azul);padding:0 8px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
  .frow.one{grid-template-columns:1fr}
  .frow.three{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:680px){.frow,.frow.three{grid-template-columns:1fr}}
  label.f{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px;color:#374260}
  label.f .hint{display:block;font-weight:500;color:var(--muted);font-size:11.5px;margin-top:2px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid #d5ddee;border-radius:8px;font-size:13.5px;
    font-family:inherit;background:#fff;color:var(--texto)}
  input:focus,select:focus,textarea:focus{outline:2px solid #bcd0ff;border-color:var(--azul)}
  textarea{min-height:70px;resize:vertical}
  .check{display:flex;gap:9px;align-items:flex-start;font-size:13px;font-weight:600;color:#374260}
  .check input{width:auto;margin-top:2px}
  .check .hint{display:block;font-weight:500;color:var(--muted);font-size:11.5px;margin-top:2px}
  .ods-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px;margin-top:12px}
  .ods-tile{display:flex;align-items:center;gap:8px;font-size:11.5px;line-height:1.25;color:#374260}
  .ods-tile .sq{width:30px;height:30px;border-radius:6px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
  .odsbox{display:flex;flex-wrap:wrap;gap:6px;max-height:150px;overflow:auto;border:1px solid var(--linha);border-radius:8px;padding:8px}
  .odsopt{font-size:11.5px;padding:5px 9px;border:1px solid #d5ddee;border-radius:16px;cursor:pointer;user-select:none}
  .odsopt.on{background:var(--azul);color:#fff;border-color:var(--azul)}
  .warn{background:#fde3e0;color:#b02a1f;border:1px solid #f3c9c5;border-radius:8px;padding:8px 11px;font-size:12.5px;font-weight:600;margin-top:6px;display:none}
  .warn.show{display:block}
  .desc-sub{background:#f5f8ff;border:1px solid #dbe6ff;border-radius:8px;padding:9px 11px;font-size:12.5px;color:#3a4870;margin-top:-4px;margin-bottom:12px;display:none}
  .desc-sub.show{display:block}
  .hidden{display:none!important}
  /* detalhe / recomendacoes */
  .rec{border:1px solid var(--linha);border-radius:10px;padding:14px;margin-bottom:14px}
  .rec h4{margin:0 0 6px;font-size:14px}
  .trat{border-left:3px solid var(--verde);padding:8px 12px;margin:8px 0;background:#f7fbf8;border-radius:0 8px 8px 0;font-size:13px}
  .trat .meta{font-size:11.5px;color:var(--muted);margin-top:3px}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--azul-esc);color:#fff;
    padding:12px 20px;border-radius:10px;font-weight:600;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:99;opacity:0;transition:.25s}
  .toast.show{opacity:1}
  /* setup */
  .setup{max-width:720px;margin:40px auto}
  .setup ol{line-height:1.7} .setup code{background:#eef1f8;padding:2px 6px;border-radius:5px}
  .aux-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .aux-tabs button{border:1px solid var(--linha);background:#fff;border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;color:#374260}
  .aux-tabs button.on{background:var(--azul);color:#fff;border-color:var(--azul)}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  textarea.tall{min-height:140px}
  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;margin-bottom:18px}
  .chart-card{padding:16px 18px}
  .chart-card h3{font-size:14px;margin:0 0 2px}
  .chart-card .cap{color:var(--muted);font-size:12px;margin:0 0 12px}
  .chart-box{position:relative;height:240px}
  .chart-box.tallbox{height:300px}
  .sec-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--azul);
    margin:6px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--linha)}
  #mapa{height:380px;border-radius:10px;border:1px solid var(--linha);z-index:1}
  .leaflet-container{font:inherit}
  .kpi .sub2{font-size:11px;color:var(--muted);margin-top:3px}
  .cgm-box{border:2px solid #cfdcff;background:#f5f8ff;border-radius:10px;padding:14px 16px;margin-bottom:16px}
  .cgm-box h4{margin:0 0 4px;font-size:13.5px;color:var(--azul2)}
  .crit{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;
    padding:9px 0;border-bottom:1px dashed var(--linha);font-size:13px}
  .crit:last-child{border-bottom:0}
  .crit .desc{font-size:11.5px;color:var(--muted);display:block;margin-top:2px}
  .simnao{display:flex;gap:6px}
  .simnao button{border:1px solid #d5ddee;background:#fff;border-radius:7px;padding:5px 14px;
    font-size:12.5px;font-weight:700;cursor:pointer;color:#5a6480}
  .simnao button.sim.on{background:var(--verde);color:#fff;border-color:var(--verde)}
  .simnao button.nao.on{background:var(--vermelho);color:#fff;border-color:var(--vermelho)}
  .placar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;padding:12px 14px;border-radius:10px;
    background:#fff;border:1px solid var(--linha);margin-top:12px}
  .placar .big{font-size:26px;font-weight:800;line-height:1}
  .veredito{padding:6px 14px;border-radius:20px;font-weight:800;font-size:13px}
  .veredito.ok{background:#e2f7e6;color:#1a8f33}
  .veredito.no{background:#fde3e0;color:#c02a1f}
  .manif{border:1px solid var(--linha);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fbfcff}
  .manif-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .manif-num{background:var(--azul);color:#fff;width:24px;height:24px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:0 0 auto}
  .manif-acoes{margin-left:auto;display:flex;gap:6px}
  .aviso-novo{position:fixed;top:96px;left:50%;transform:translateX(-50%);z-index:60;
    background:var(--azul);color:#fff;border-radius:22px;padding:9px 18px;font-size:13px;font-weight:700;
    box-shadow:0 6px 20px rgba(10,40,120,.3);cursor:pointer;display:none;border:0}
  .aviso-novo.show{display:block}
  .conflito{background:#fff4e5;border:1px solid #f0c890;color:#8a5200;border-radius:8px;
    padding:10px 12px;font-size:12.5px;margin-bottom:12px}
  .codigo{font-family:ui-monospace,Consolas,monospace;font-size:16px;font-weight:800;color:var(--azul2);
    background:#e5edff;padding:8px 14px;border-radius:8px;display:inline-block;letter-spacing:.5px}
</style>
</head>

tinadas à promoção do direito humano à alimentação adequada.", "ods": 2}, {"area": "Política educacional", "subarea": "Mediação no ambiente escolar", "descricao": "Manifestações relacionadas à mediação no ambiente escolar, abrangendo ações de acompanhamento, orientação e intervenção pedagógica ou socioeducativa destinadas a promover a aprendizagem, a convivência harmoniosa, a resolução de conflitos, o desenvolvimento dos estudantes e o adequado relacionamento entre os membros da comunidade escolar.", "ods": 4}, {"area": "Política educacional", "subarea": "Diretrizes e funcionamento escolar", "descricao": "Manifestações relacionadas às diretrizes e ao funcionamento das instituições de ensino da rede pública municipal, abrangendo normas, orientações e procedimentos que disciplinam a organização pedagógica, administrativa e disciplinar, bem como a aplicação da legislação educacional e demais aspectos relativos ao funcionamento escolar.", "ods": 4}, {"area": "Política educacional", "subarea": "Educação especial", "descricao": "Manifestações relacionadas à educação especial na perspectiva da educação inclusiva, abrangendo atendimento educacional especializado, acessibilidade, recursos de apoio, profissionais de apoio escolar, adaptações, inclusão, atendimento aos estudantes público-alvo da educação especial e demais ações voltadas à garantia do direito à educação.", "ods": 4}, {"area": "Política educacional", "subarea": "Material escolar e uniforme", "descricao": "Manifestações relacionadas ao fornecimento de material escolar e uniformes aos estudantes da rede pública municipal de ensino, abrangendo aquisição, distribuição, entrega, qualidade, reposição, quantitativos, prazos e demais aspectos referentes a esses itens.", "ods": 4}, {"area": "Política educacional", "subarea": "Merenda escolar", "descricao": "Manifestações relacionadas à alimentação escolar oferecida aos estudantes da rede pública municipal de ensino, abrangendo qualidade, quantidade, cardápio, fornecimento, preparo, distribuição, condições de higiene, atendimento às necessidades alimentares específicas e demais aspectos relativos à execução do programa de alimentação escolar.", "ods": 4}, {"area": "Política educacional", "subarea": "Transporte escolar", "descricao": "Manifestações relacionadas ao transporte escolar, abrangendo disponibilidade, rotas, horários, pontos de embarque e desembarque, segurança, acessibilidade, condições dos veículos, conduta dos prestadores do serviço e demais aspectos relativos à prestação do transporte escolar.", "ods": 4}, {"area": "Política educacional", "subarea": "Gestão de vagas", "descricao": "Manifestações relacionadas à gestão de vagas na rede municipal de ensino, abrangendo disponibilidade, oferta, distribuição, remanejamento, lista de espera, critérios de priorização, matrícula, transferência e demais procedimentos relativos ao acesso e à ocupação de vagas nas unidades educacionais. Considerar Central de Vagas.", "ods": 4}, {"area": "Política funerária", "subarea": "Exumação e transporte de corpos", "descricao": "Manifestações relacionadas à exumação, remoção e transporte de corpos ou restos mortais, abrangendo autorizações, procedimentos, prazos, documentação, traslados entre cemitérios e o transporte proveniente de outras localidades, bem como demais questões administrativas de competência da Administração Pública Municipal.", "ods": 11}, {"area": "Política funerária", "subarea": "Túmulos e jazigos", "descricao": "Manifestações relacionadas a túmulos e jazigos em cemitérios públicos municipais, abrangendo concessão, regularização, transferência, conservação, manutenção, identificação, exumação, ocupação, utilização e demais procedimentos administrativos relacionados.", "ods": 11}, {"area": "Proteção animal", "subarea": "Animais silvestres", "descricao": "Manifestações relacionadas aos animais silvestres, compreendidos como aqueles pertencentes às espécies nativas ou migratórias da fauna brasileira, abrangendo resgate, recolhimento, aparecimento em áreas urbanas, manejo, destinação, orientação à população e demais ações de competência ou articulação do Município com os órgãos ambientais competentes.", "ods": 15}, {"area": "Proteção animal", "subarea": "Banco de ração", "descricao": "Manifestações relacionadas ao Programa Banco de Ração, abrangendo a captação e distribuição de ração, medicamentos, utensílios e demais insumos destinados à proteção e ao bem-estar animal, bem como o credenciamento, acompanhamento e atendimento de entidades de proteção animal, protetores independentes e famílias beneficiárias do programa.", "ods": 15}, {"area": "Proteção animal", "subarea": "Castração de animais", "descricao": "Manifestações relacionadas aos serviços de castração de animais, abrangendo programas de esterilização, unidades móveis de castração, inscrições, agendamentos, critérios de atendimento, locais, cronogramas, realização dos procedimentos e demais ações voltadas ao controle populacional e ao bem-estar animal.", "ods": 15}, {"area": "Proteção animal", "subarea": "Maus tratos aos animais", "descricao": "Manifestações relacionadas à suspeita ou ocorrência de maus-tratos contra animais, envolvendo ações ou omissões que provoquem sofrimento, abuso, violência, negligência, abandono ou outras condutas vedadas pela legislação de proteção animal.", "ods": 15}, {"area": "Proteção animal", "subarea": "Recolhimento de animais de grande porte", "descricao": "Manifestações relacionadas à solicitação de recolhimento de animais de grande porte soltos, abandonados ou em situação de risco em vias públicas ou outros locais, quando houver atuação ou competência da Administração Pública Municipal.", "ods": 15}, {"area": "Relacionamento com o usuário", "subarea": "Agendamento", "descricao": "Manifestações relacionadas ao agendamento de atendimentos, serviços, consultas, procedimentos ou demais atividades da Administração Pública Municipal, abrangendo disponibilidade de vagas, marcação, confirmação, remarcação, cancelamento, prazos e demais aspectos relativos ao processo de agendamento.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Atendimento por canais digitais", "descricao": "Manifestações relacionadas ao atendimento prestado por canais digitais da Administração Pública Municipal, abrangendo WhatsApp, e-mail, chat, redes sociais e outros meios eletrônicos de comunicação, incluindo a percepção do usuário quanto à qualidade do atendimento, cordialidade, clareza das informações, tempo de resposta e resolutividade.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Atendimento presencial", "descricao": "Manifestações relacionadas ao atendimento presencial prestado por agentes públicos, abrangendo a percepção do usuário quanto à qualidade do atendimento, acolhimento, cordialidade, clareza das informações, resolutividade e demais aspectos da interação durante o atendimento presencial.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Atendimento telefônico", "descricao": "Manifestações relacionadas ao atendimento telefônico prestado pela Administração Pública Municipal, abrangendo qualidade do atendimento, tempo de espera, disponibilidade do serviço, cordialidade, orientações prestadas, funcionamento dos canais telefônicos e demais aspectos relativos ao atendimento ao usuário.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Comunicação institucional", "descricao": "Manifestações relacionadas à comunicação institucional da Administração Pública Municipal, abrangendo o conteúdo, a divulgação, a clareza e a qualidade das informações veiculadas no site oficial, redes sociais públicas, campanhas institucionais, materiais informativos e demais canais oficiais de comunicação com o usuário.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Reconhecimento individual", "descricao": "Manifestações de elogio direcionadas à atuação de agente público específico ou identificável, em reconhecimento à qualidade do atendimento, profissionalismo, dedicação, cordialidade ou demais condutas positivas no exercício de suas atribuições.", "ods": 16}, {"area": "Relacionamento com o usuário", "subarea": "Reconhecimento institucional", "descricao": "Manifestações relacionadas à atuação de equipes, setores ou unidades da Administração Pública, quando o reconhecimento, elogio ou avaliação se referir ao desempenho coletivo, sem identificação de agente público específico.", "ods": 16}, {"area": "Saúde", "subarea": "Atendimento domiciliar", "descricao": "Manifestações relacionadas à atenção domiciliar prestada pela rede pública de saúde, abrangendo visitas domiciliares, atendimento multiprofissional, acompanhamento de pacientes acamados ou com dificuldade de locomoção, agendamento, realização, periodicidade e demais aspectos relativos à assistência em domicílio.", "ods": 3}, {"area": "Saúde", "subarea": "Atendimento multiprofissional", "descricao": "Manifestações relacionadas ao atendimento multiprofissional na rede pública de saúde, compreendido como a assistência prestada por equipe composta por profissionais de diferentes áreas da saúde, abrangendo atendimentos de psicologia, fonoaudiologia, terapia ocupacional, fisioterapia, nutrição, serviço social e demais especialidades multiprofissionais, incluindo acolhimento, avaliação, acompanhamento, encaminhamentos, fluxos de atendimento e demais aspectos relativos aos serviços prestados.", "ods": 3}, {"area": "Saúde", "subarea": "Atendimento de urgência e emergência", "descricao": "Manifestações relacionadas ao atendimento de urgência e emergência na rede pública de saúde, compreendido como a assistência destinada a situações que exigem avaliação e intervenção imediata ou em curto prazo, abrangendo acolhimento, classificação de risco, tempo de espera, atendimento médico e multiprofissional, encaminhamentos, estabilização do paciente e demais aspectos relativos aos serviços de urgência e emergência. Considerar UPAs e PAs.", "ods": 3}, {"area": "Saúde", "subarea": "Cirurgias eletivas", "descricao": "Manifestações relacionadas às cirurgias eletivas, compreendidas como procedimentos cirúrgicos programados, sem caráter de urgência ou emergência, abrangendo indicação cirúrgica, inclusão e posição na fila de espera, regulação, agendamento, remarcação, cancelamento, prazos, realização do procedimento e demais aspectos relativos ao atendimento cirúrgico na rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Consulta médica", "descricao": "A consulta com especialista corresponde ao atendimento realizado por médico ou outro profissional de saúde com especialização em área específica, destinado à avaliação clínica, diagnóstico, tratamento, acompanhamento ou orientação, geralmente mediante encaminhamento da atenção básica ou de outro serviço de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Dietas e insumos de saúde", "descricao": "Manifestações relacionadas ao fornecimento de insumos de saúde, abrangendo fraldas, dietas e fórmulas nutricionais, suplementos alimentares, materiais para higiene e cuidados pessoais, sondas, bolsas coletoras e demais insumos destinados ao tratamento, à reabilitação e aos cuidados dos usuários da rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Dispositivos auxiliares de locomoção", "descricao": "Manifestações relacionadas ao fornecimento, manutenção, substituição, adaptação, avaliação e demais aspectos relativos a órteses, próteses e meios auxiliares de locomoção, tais como cadeiras de rodas, cadeiras de banho, andadores, muletas, bengalas e outros dispositivos destinados à promoção da mobilidade, autonomia e reabilitação dos usuários do Sistema Único de Saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Dispositivos médicos", "descricao": "Manifestações relacionadas ao fornecimento, manutenção, substituição, adaptação e demais aspectos relativos a dispositivos médicos e terapêuticos, tais como aparelhos auditivos, aparelhos para monitorização contínua da glicose, canetas de insulina e outros dispositivos destinados ao tratamento, monitoramento ou reabilitação dos usuários da rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Exames", "descricao": "Manifestações relacionadas à solicitação, agendamento, realização, remarcação, disponibilidade, resultados, entrega de laudos, prazos, regulação e demais aspectos relativos aos exames ofertados pela rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Medicamentos", "descricao": "Demanda de farmácias de UBS ou Farmácia Municipal.", "ods": 3}, {"area": "Saúde", "subarea": "Prontuário médico", "descricao": "Manifestações relacionadas ao acesso à documentação em saúde, abrangendo prontuários médicos, certificados e atestados de vacinação, solicitação de cópias, disponibilização de documentos, retificação, integridade, guarda, sigilo, compartilhamento de informações e demais aspectos relativos aos registros de atendimento dos usuários da rede pública de saúde.", "ods": 3}, {"area": "Saúde", "subarea": "Receita médica", "descricao": "Manifestações relacionadas à emissão de receitas médicas, abrangendo inconsistências na prescrição, recusa, atraso ou prazo para emissão, renovação, retificação e demais aspectos relativos à prescrição de medicamentos, insumos e produtos para a saúde no âmbito da rede pública municipal.", "ods": 3}, {"area": "Saúde", "subarea": "Transporte domiciliar", "descricao": "Manifestações relacionadas ao transporte domiciliar de pacientes, abrangendo solicitação, agendamento, disponibilidade, elegibilidade, pontualidade, condições do transporte, acessibilidade, transporte para consultas, exames, tratamentos e demais aspectos relativos à prestação do serviço.", "ods": 3}, {"area": "Saúde", "subarea": "Transporte móvel de urgência", "descricao": "Manifestações relacionadas ao transporte móvel de urgência e emergência, abrangendo solicitação, atendimento, tempo de resposta, regulação, remoção de pacientes, disponibilidade de ambulâncias, qualidade do atendimento e demais aspectos relativos à prestação do serviço de atendimento pré-hospitalar móvel.", "ods": 3}, {"area": "Saúde", "subarea": "Vacinação", "descricao": "Manifestações relacionadas aos serviços de vacinação, abrangendo disponibilidade de vacinas, campanhas de imunização, locais e horários de atendimento, aplicação de vacinas, registro vacinal, atualização da caderneta de vacinação e demais aspectos relativos à imunização.", "ods": 3}, {"area": "Segurança pública", "subarea": "Defesa Civil", "descricao": "Manifestações relacionadas às ações de proteção e defesa civil, abrangendo prevenção, mitigação, preparação, resposta e recuperação em situações de desastres naturais ou tecnológicos, vistorias, emissão de laudos, interdições, avaliação de riscos e demais ações de competência da Defesa Civil Municipal.", "ods": 16}, {"area": "Segurança pública", "subarea": "Patrulhamento", "descricao": "Manifestações relacionadas ao patrulhamento preventivo realizado pelos órgãos de segurança pública municipal, abrangendo rondas, presença ostensiva, atendimento a ocorrências, intensificação do patrulhamento e demais ações voltadas à proteção da população, do patrimônio público e da ordem pública.", "ods": 16}, {"area": "Serviços urbanos", "subarea": "Capina e Roçagem", "descricao": "Manifestações relacionadas aos serviços de capina e roçagem em áreas públicas, abrangendo controle da vegetação, limpeza de terrenos, praças, canteiros, vias públicas e demais espaços públicos, visando à conservação, segurança e manutenção urbana.", "ods": 11}, {"area": "Serviços urbanos", "subarea": "Coleta de resíduos domiciliares", "descricao": "Manifestações relacionadas ao serviço de coleta de resíduos domiciliares, abrangendo dias e horários de coleta, roteiros, atendimento às localidades, acondicionamento dos resíduos, regularidade da prestação do serviço e demais aspectos relativos à coleta convencional de resíduos domiciliares.", "ods": 11}, {"area": "Serviços urbanos", "subarea": "Coleta seletiva", "descricao": "Manifestações relacionadas ao serviço de coleta seletiva, abrangendo coleta de resíduos recicláveis, dias e horários de coleta, roteiros, atendimento às localidades, acondicionamento dos materiais e demais aspectos relativos à prestação do serviço.", "ods": 12}, {"area": "Serviços urbanos", "subarea": "Manutenção de espaços públicos", "descricao": "Manifestações relacionadas à manutenção e conservação de espaços públicos, abrangendo praças, parques, jardins, áreas de convivência e demais espaços de uso coletivo, incluindo limpeza, reparos, conservação e demais serviços destinados à preservação desses locais.", "ods": 11}, {"area": "Serviços urbanos", "subarea": "Manutenção de próprios públicos", "descricao": "Manifestações relacionadas à manutenção e conservação dos próprios públicos municipais, abrangendo edificações, instalações, estruturas, equipamentos prediais e demais serviços destinados à preservação e ao adequado funcionamento dos imóveis públicos.", "ods": 11}, {"area": "Serviços urbanos", "subarea": "Paisagismo e jardinagem", "descricao": "Manifestações relacionadas aos serviços de paisagismo e jardinagem em áreas públicas, abrangendo implantação, manutenção, conservação e revitalização de jardins, canteiros, floreiras, gramados, espécies ornamentais e demais elementos paisagísticos.", "ods": 11}, {"area": "Trânsito e Mobilidade", "subarea": "Acessibilidade", "descricao": "Manifestações relacionadas à acessibilidade e à eliminação de barreiras no sistema de mobilidade urbana, abrangendo calçadas, travessias, rampas, pisos táteis, sinalização acessível, pontos e terminais de transporte, vagas de estacionamento, mobiliário urbano e demais condições que assegurem o deslocamento seguro e autônomo das pessoas, especialmente daquelas com deficiência ou mobilidade reduzida.", "ods": 11}, {"area": "Trânsito e Mobilidade", "subarea": "Credenciais de estacionamento", "descricao": "Manifestações relaci ireitos e vantagens dos agentes públicos, compreendidos como os direitos, benefícios e vantagens previstos na legislação funcional, abrangendo remuneração, adicionais, gratificações, férias, licenças, auxílios, indenizações, afastamentos remunerados e demais direitos assegurados aos servidores públicos municipais.", "ods": 16}, {"area": "Vida funcional do agente público", "subarea": "Jornada de trabalho", "descricao": "Manifestações relacionadas à jornada de trabalho dos agentes públicos, compreendida como o período de prestação de serviço estabelecido pela legislação, abrangendo carga horária, controle de frequência, registro de ponto, escalas, plantões, compensação de horas, banco de horas, horários de trabalho e demais aspectos relativos ao cumprimento da jornada funcional.", "ods": 16}, {"area": "Vida funcional do agente público", "subarea": "Movimentação funcional", "descricao": "Manifestações relacionadas à movimentação funcional dos agentes públicos, compreendida como as alterações na situação funcional do servidor durante sua vida funcional, abrangendo remoção, relotação, redistribuição, cessão, disposição, designações, readaptação, substituições e demais formas de movimentação previstas na legislação.", "ods": 16}, {"area": "Vida funcional do agente público", "subarea": "Afastamentos e licenças", "descricao": "Manifestações relacionadas aos afastamentos e licenças dos agentes públicos, compreendidos como as hipóteses de interrupção temporária do exercício das funções previstas na legislação, abrangendo licenças para tratamento de saúde, gestante, adotante, paternidade, por motivo de doença em pessoa da família, para serviço militar, atividade política, mandato eletivo, interesse particular, capacitação e demais afastamentos legais.", "ods": 16}, {"area": "Vida funcional do agente público", "subarea": "Avaliação e desenvolvimento funcional", "descricao": "Manifestações relacionadas à avaliação e ao desenvolvimento funcional dos agentes públicos, compreendido /* ===================================================================
   CONTAGEM DE PRAZOS — Art. 13
   I  – contínuos, excluída a data do protocolo na contagem inicial;
   II – só se iniciam ou vencem em dia útil;
   III– na prorrogação, a contagem reinicia no dia subsequente à data final.

   Feriados (Lei Municipal nº 13.903/2024, art. 4º):
     fixos  01/01, 21/04, 01/05, 07/09, 12/10, 02/11, 15/11,
            20/11 (Lei Federal 14.759/2023), 10/12, 25/12
     móveis Sexta-feira da Paixão (Páscoa −2), Corpus Christi (Páscoa +60),
            Sagrado Coração de Jesus (Corpus Christi +8)
   O Carnaval está suspenso pelo Decreto Municipal nº 185/2025.
   Exceções (pontos facultativos etc.) ficam em Gestão do Sistema → Feriados.
=================================================================== */
const FERIADOS_FIXOS={"01-01":"Confraternização Universal","04-21":"Tiradentes",
 "05-01":"Dia do Trabalho","09-07":"Independência do Brasil","10-12":"Nossa Senhora Aparecida",
 "11-02":"Finados","11-15":"Proclamação da República","11-20":"Consciência Negra",
 "12-10":"Aniversário de Londrina","12-25":"Natal"};
const _cacheFer={};
function _iso(d){return d.toISOString().slice(0,10);}
function _dt(s){return new Date(s+"T12:00:00Z");}
function _add(d,n){const x=new Date(d.getTime());x.setUTCDate(x.getUTCDate()+n);return x;}
function pascoa(ano){ // algoritmo de Meeus/Jones/Butcher
  const a=ano%19,b=Math.floor(ano/100),c=ano%100,d=Math.floor(b/4),e=b%4,
    f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),hh=(19*a+b-d-g+15)%30,
    i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-hh-k)%7,m=Math.floor((a+11*hh+22*l)/451),
    mes=Math.floor((hh+l-7*m+114)/31),dia=((hh+l-7*m+114)%31)+1;
  return new Date(Date.UTC(ano,mes-1,dia,12,0,0));
}
function feriadosDoAno(ano){
  if(_cacheFer[ano])return _cacheFer[ano];
  const m={};
  for(const [md,nome] of Object.entries(FERIADOS_FIXOS)) m[ano+"-"+md]=nome;
  const pa=pascoa(ano);
  const cc=_add(pa,60);
  m[_iso(_add(pa,-2))]="Sexta-feira da Paixão";
  m[_iso(cc)]="Corpus Christi";
  m[_iso(_add(cc,8))]="Sagrado Coração de Jesus (Padroeiro)";
  // exceções cadastradas (pontos facultativos, suspensões)
  (AUX.feriados||[]).forEach(f=>{if(f&&f.data)m[String(f.data).slice(0,10)]=f.nome||"Ponto facultativo";});
  _cacheFer[ano]=m;return m;
}
function feriadoNome(d){return feriadosDoAno(d.getUTCFullYear())[_iso(d)]||null;}
function ehDiaUtil(d){const w=d.getUTCDay();return w!==0&&w!==6&&!feriadoNome(d);}
function proxUtil(d,log){
  let x=d,guard=0;
  while(!ehDiaUtil(x)&&guard++<400){
    if(log){const w=x.getUTCDay();
      log.push(fmtDate(_iso(x))+" — "+(feriadoNome(x)||(w===0?"domingo":"sábado")));}
    x=_add(x,1);
  }
  return x;
}
// prazo simples: protocolo + N dias, conforme incisos I e II
function prazoLegal(protocolo,dias,log){
  if(!protocolo)return null;
  let ini=_add(_dt(protocolo),1);            // I – exclui a data do protocolo
  ini=proxUtil(ini,log);                      // II – só se inicia em dia útil
  let fim=_add(ini,dias-1);                   // contagem contínua (o início é o 1º dia)
  fim=proxUtil(fim,log);                      // II – só vence em dia útil
  return {inicio:_iso(ini),fim:_iso(fim)};
}
// prorrogação: inciso III – reinicia no dia subsequente à data final
function prazoProrrogado(protocolo,dias1,dias2,log){
  const p1=prazoLegal(protocolo,dias1,log);
  if(!p1)return null;
  let ini2=proxUtil(_add(_dt(p1.fim),1),log);
  let fim2=proxUtil(_add(ini2,dias2-1),log);
  return {p1:p1,inicio:_iso(ini2),fim:_iso(fim2)};
}
function memoriaPrazo(protocolo,prorrogado){
  if(!protocolo)return "";
  const log=[];
  const partes=[];
  if(!prorrogado){
    const r=prazoLegal(protocolo,20,log);
    partes.push("Protocolo em "+fmtDate(protocolo)+" (excluído da contagem, inciso I).");
    partes.push("Início em "+fmtDate(r.inicio)+" · 20 dias contínuos · vencimento em <b>"+fmtDate(r.fim)+"</b>.");
  }else{
    const r=prazoProrrogado(protocolo,20,10,log);
    partes.push("Protocolo em "+fmtDate(protocolo)+" (excluído da contagem, inciso I).");
    partes.push("Prazo original: "+fmtDate(r.p1.inicio)+" a "+fmtDate(r.p1.fim)+" (20 dias).");
    partes.push("Prorrogação reiniciada em "+fmtDate(r.inicio)+" (inciso III) · 10 dias · vencimento em <b>"+fmtDate(r.fim)+"</b>.");
  }
  if(log.length)partes.push("Adiamentos por dia não útil: "+[...new Set(log)].join("; ")+".");
  return partes.join("<br>");
}

async function init(){
  let url=(CONFIG.SUPABASE_URL||"").trim();
  let key=(CONFIG.SUPABASE_ANON_KEY||"").trim();
  // autocorreção: se URL e chave estiverem trocadas, inverte
  if(url.startsWith("eyJ") && key.startsWith("http")){const t=url;url=key;key=t;}
  // limpa sufixos comuns colados por engano na URL
  url=url.replace(/\/rest\/v1\/?$/,"").replace(/\/+$/,"");

  sb = supabase.createClient(url, key);

  ligarTempoReal();
  go("painel");
}

/* dados auxiliares: usa o banco; se a tabela estiver vazia, cai no SEED (em memória) */
async function loadAux(){
  // 1 única chamada ao banco (função aux_todas). Se ela ainda não existir,
  // cai no modo antigo, buscando as tabelas em paralelo.
  try{
    const {data,error}=await sb.rpc('aux_todas');
    if(!error && data){
      let vazio=true;
      for(const k of Object.keys(data)){
        const v=data[k];
        if(v && v.length){AUX[k]=v;vazio=false;}else{AUX[k]=fallback(k);}
      }
      if(!vazio) return;
    }
  }catch(e){}
  return loadAuxAntigo();
}
async function loadAuxAntigo(){
  const map = {
    taxonomia:"aux_taxonomia", ods:"aux_ods", lai_motivos:"aux_lai_motivos",
    servidores:"aux_servidores", unidades:"aux_unidades", orgaos:"aux_orgaos",
    tipos_demanda:"aux_tipos_demanda", tipos_documento:"aux_tipos_documento", status:"aux_status",
    predios:"aux_predios", tipos_tratativa:"aux_tipos_tratativa",
    tipos_irregularidade:"aux_tipos_irregularidade", feriados:"aux_feriados",
    hipoteses_inabilit:"aux_hipoteses_inabilitacao"
  };
  // busca todas as tabelas EM PARALELO (antes era uma após a outra)
  const chaves=Object.keys(map);
  const res=await Promise.all(chaves.map(k=>
    sb.from(map[k]).select("*").then(r=>r).catch(()=>({data:null}))));
  chaves.forEach((k,i)=>{
    const data=res[i]&&res[i].data;
    if(data && data.length){
      if(k==="tipos_demanda"||k==="tipos_documento"||k==="status"||k==="tipos_tratativa"||k==="tipos_irregularidade") AUX[k]=data.map(r=>r.nome);
      else AUX[k]=data;
    }else AUX[k]=fallback(k);
  });
}
function fallback(k){
  if(k==="taxonomia")return SEED.taxonomia;
  if(k==="ods")return SEED.ods;
  if(k==="lai_motivos")return SEED.lai_motivos;
  if(k==="servidores")return SEED.servidores;
  if(k==="unidades")return SEED.unidades;
  if(k==="orgaos")return SEED.orgaos;
  if(k==="tipos_demanda")return SEED.tipos_demanda;
  if(k==="tipos_documento")return SEED.tipos_documento;
  if(k==="status")return SEED.status;
  if(k==="predios")return SEED.predios||[];
  if(k==="tipos_tratativa")return SEED.tipos_tratativa||[];
  if(k==="tipos_irregularidade")return SEED.tipos_irregularidade||[];
  if(k==="feriados")return [];
  if(k==="hipoteses_inabilit"){ // deriva da taxonomia oficial, se a tabela não existir
    return (AUX.taxonomia||SEED.taxonomia||[])
      .filter(t=>t.area==="Gestão de manifestações"&&/^Não habilitada/.test(t.subarea||""))
      .map(t=>({nome:String(t.subarea).replace(/^Não habilitada\s*-\s*/,""),fundamento:t.descricao||""}))
      .filter(x=>hipAplicavel(x.nome));
  }
  return [];
}

function statsLocal(p){
  const g=(campo,lim)=>{const m={};p.forEach(x=>{const k=x[campo]||"(sem)";m[k]=(m[k]||0)+1;});
    const a=Object.entries(m).sort((x,y)=>y[1]-x[1]);return lim?a.slice(0,lim):a;};
  const orgaosDe=x=>(x.orgaos&&x.orgaos.length)?x.orgaos:(x.orgao_demandado?String(x.orgao_demandado).split('; ').filter(Boolean):[]);
  const conc=x=>["Concluído","Arquivado"].includes(x.status);
  const dc=x=>x.doc_data_saida||(x.updated_at?String(x.updated_at).slice(0,10):null);
  const dias=(a,b)=>{if(!a||!b)return null;const d=(new Date(b)-new Date(a))/86400000;return isFinite(d)?d:null;};
  const durs=p.filter(conc).map(x=>dias(x.data_entrada,dc(x))).filter(d=>d!=null&&d>=0);
  const idades=p.filter(x=>!conc(x)&&x.data_entrada).map(x=>dias(x.data_entrada,today())).filter(d=>d!=null&&d>=0);
  const cp=p.filter(x=>x.prazo_interno);
  const noPrazo=x=>conc(x)?((dc(x)||today())<=x.prazo_interno):(today()<=x.prazo_interno);
  const orgC={};p.forEach(x=>orgaosDe(x).forEach(o=>{orgC[o]=(orgC[o]||0)+1;}));
  const odsC={};p.forEach(x=>(x.ods||[]).forEach(o=>{odsC[o]=(odsC[o]||0)+1;}));
  const meses=[];const base=new Date();
  for(let i=11;i>=0;i--){const d=new Date(base.getFullYear(),base.getMonth()-i,1);meses.push(d.toISOString().slice(0,7));}
  const net=p.filter(x=>String(x.doc_tipo||'')==='Nota de Esclarecimento Técnico');
  const geo=p.filter(x=>x.latitude&&x.longitude);
  const bm={};geo.forEach(x=>{const b=x.bairro||'(sem bairro)';(bm[b]=bm[b]||{la:0,lo:0,n:0});bm[b].la+=(+x.latitude);bm[b].lo+=(+x.longitude);bm[b].n++;});
  return {
    total:p.length, abertos:p.filter(x=>!conc(x)).length, concluidos:p.filter(conc).length,
    externos:p.filter(x=>x.tramitacao_ext).length,
    lai:p.filter(x=>String(x.tipo_demanda||"").includes("LAI")).length,
    vencidos:p.filter(x=>x.prazo_interno&&x.prazo_interno<today()&&!conc(x)).length,
    manifestacoes:p.reduce((s,x)=>s+Math.max(1,orgaosDe(x).length),0),
    net_emit:net.length, net_acat:net.filter(x=>x.net_acatada).length, geo_total:geo.length,
    com_prazo:cp.length, dentro_prazo:cp.filter(noPrazo).length,
    tmed:durs.length?Math.round(durs.reduce((a,b)=>a+b,0)/durs.length):null,
    idade_med:idades.length?Math.round(idades.reduce((a,b)=>a+b,0)/idades.length):null,
    status:g('status'), tipo:g('tipo_demanda'), unidade:g('unidade_resp'),
    area:g('area',10), servidor:g('servidor',10),
    bairro:Object.entries(p.filter(x=>x.bairro).reduce((m,x)=>{m[x.bairro]=(m[x.bairro]||0)+1;return m;},{})).sort((a,b)=>b[1]-a[1]).slice(0,10),
    orgao:Object.entries(orgC).sort((a,b)=>b[1]-a[1]).slice(0,8),
    ods:Object.entries(odsC).map(([k,v])=>[Number(k),v]).sort((a,b)=>a[0]-b[0]),
    mensal:meses.map(m=>[m,
      p.filter(x=>String(x.data_entrada||'').slice(0,7)===m).length,
      p.filter(x=>conc(x)&&String(dc(x)||'').slice(0,7)===m).length]),
    heat:Object.entries(bm).map(([b,o])=>[b,o.la/o.n,o.lo/o.n,o.n])
  };
}

// monta a consulta com TODOS os filtros aplicados no banco
function queryProcessos(sel,opts){
  let q=sb.from("processos").select(sel,opts);
  if(filtro.status)q=q.eq("status",filtro.status);
  if(filtro.area)q=q.eq("area",filtro.area);
  if(filtro.servidor)q=q.eq("servidor",filtro.servidor);
  if(filtro.ext==="sim")q=q.eq("tramitacao_ext",true);
  if(filtro.ext==="nao")q=q.eq("tramitacao_ext",false);
  if(filtro.orgao)q=q.ilike("orgao_demandado","%"+filtro.orgao+"%");
  const t=String(filtro.q||"").replace(/[%,()]/g," ").trim();
  if(t){q=q.or(["numero_sei","orgao_demandado","servidor","area","subarea","bairro","endereco"]
      .map(c=>`${c}.ilike.%${t}%`).join(","));}
  return q;
}

  const from=PG.page*PG.size, to=from+PG.size-1;
  const {data,count,error}=await queryProcessos(LIST_COLS,{count:"exact"})
    .order("created_at",{ascending:false}).range(from,to);
  if(error){tb.innerHTML=`<tr><td colspan="10"><div class="empty">Erro ao carregar: ${esc(error.message)}</div></td></tr>`;return;}
  const rows=data||[];PG.total=count||0;PROCESSOS=rows;
  tb.innerHTML=rows.length?rows.map(rowProc).join("")
    :`<tr><td colspan="9"><div class="empty">Nenhum processo encontrado. Clique em <b>+ Novo processo</b>.</div></td></tr>`;
  const c=$("#fcount");if(c)c.textContent=PG.total+" processo(s)";
  const pages=Math.max(1,Math.ceil(PG.total/PG.size));
  const pi=$("#pginfo");if(pi)pi.textContent=`Página ${PG.page+1} de ${pages}`;
  const pv=$("#pgprev"),pn=$("#pgnext");
  if(pv)pv.disabled=PG.page===0;
  if(pn)pn.disabled=(PG.page+1)>=pages;
  tb.querySelectorAll("tr[data-id]").forEach(tr=>tr.onclick=e=>{
    if(e.target.closest("a"))return;
    abrirProcesso(tr.dataset.id);
  });
}

// a lista traz só as colunas leves; ao abrir, busca o registro completo
async function abrirProcesso(id){
  const {data,error}=await sb.from("processos").select("*").eq("id",id).single();
  if(error){toast("Erro ao abrir: "+error.message);return;}
  formProcesso(data);
}

function prazoCell(p){
  if(!p.prazo_interno)return "—";
  const venc=p.prazo_interno<today() && !["Concluído","Arquivado"].includes(p.status);
  return `<span class="${venc?'prazo-venc':'prazo-ok'}">${fmtDate(p.prazo_interno)}${venc?' ⚠':''}</span>`;
}
function statusChip(s){
  const map={"Concluído":"green","Arquivado":"gray","Em análise":"blue","Aguardando informações":"amber",
    "Habilitado":"green","Em tramitação externa":"orange","Respondido ao usuário":"blue","Não habilitada":"red"};
  return `<span class="chip ${map[s]||'gray'}">${esc(s||'—')}</span>`;
}
function servChip(nome){
  if(!nome)return "—";
  const c=servColor(nome);
  return `<span class="chip" style="background:${c}1f;color:${c}">${esc(nome)}</span>`;
}
function rowProc(p){
  const siglas=(p.orgaos&&p.orgaos.length?p.orgaos:String(p.orgao_demandado||'').split('; ')).filter(Boolean).map(o=>String(o).split(' — ')[0]).join(', ');
  return `<tr data-id="${p.id}">
    <td><b>${esc(p.numero_sei||'—')}</b>${p.link_sei?` <a href="${esc(p.link_sei)}" target="_blank" rel="noopener" title="Abrir processo no SEI">🔗 SEI</a>`:''}${p.tramitacao_ext?'<br><span class="chip orange">externa</span>':''}${p.cgm_codigo?`<br><span class="chip blue" title="Vinculado à CGM">${esc(p.cgm_codigo)}</span>`:''}</td>
    <td>${fmtDate(p.data_entrada)}</td>
    <td>${esc(p.tipo_demanda||'—')}</td>
    <td>${esc(siglas||'—')}</td>
    <td style="text-align:center">${p.n_manifestacoes>1?`<span class="chip blue" title="Processo desmembrado">${p.n_manifestacoes}</span>`:(p.n_manifestacoes||1)}</td>
    <td>${esc(p.area||'—')}<br><span class="muted small">${esc(p.subarea||'')}</span></td>
    <td>${servChip(p.servidor)}</td>
    <td>${esc(String(p.unidade_resp||'—').split(' — ')[0])}</td>
    <td>${prazoCell(p)}</td>
    <td>${statusChip(p.status)}</td>
  </tr>`;
}

  // prazo automático: 20 dias da data de entrada (30 se prorrogado)

        </div>
        <div class="desc-sub show" id="memoria_prazo" style="margin-top:0"></div>
        <label class="check"><input type="checkbox" id="tramitacao_ext" ${p.tramitacao_ext?'checked':''}>
          <span>Tramitação externa — processo saiu da OGM<span class="hint" style="font-weight:500">Marque quando o processo sair da OGM (vai para outro órgão). Desmarque quando retornar.</span></span></label>

      <fieldset><legend>Documento emitido pela OGM</legend>

          <div><label class="f">Número do documento</label><input id="doc_numero" value="${esc(p.doc_numero||'')}"></div>
          <div><label class="f">Data de saída</label><input type="date" id="doc_data_saida" value="${esc(p.doc_data_saida||'')}"></div>
        </div>
        <label class="check"><input type="checkbox" id="net_acatada" ${p.net_acatada?'checked':''}>
          <span>Nota de Esclarecimento Técnico acatada <span class="hint">Marque quando a NET emitida pela OGM for acatada pelo órgão. Alimenta o gráfico do Painel.</span></span></label>
      </fieldset>

      <fieldset id="lai_fs" class="${isLAI(p.tipo_demanda)?'':'hidden'}"><legend>Acesso à Informação (LAI)</legend>
        <div class="frow">
          <div><label class="f">Situação do pedido</label><select id="lai_situacao"><option value="">Selecione…</option>${laiSit}</select></div>
          <div><label class="f">Motivo da negativa</label><select id="lai_motivo"><option value="">—</option></select></div>
        </div>
      </fieldset>

      <fieldset><legend>Integração com a Controladoria-Geral do Município</legend>
        <label class="check"><input type="checkbox" id="vinculo_cgm" ${p.vinculo_cgm?'checked':''}>
          <span>Vincular este processo à CGM<span class="hint">Ao marcar, abre o questionário de critérios de admissibilidade. A validação gera um identificador único que permite o rastreamento nos dois sistemas.</span></span></label>
        <div id="cgm_resumo" style="margin-top:10px"></div>
      </fieldset>

      ${isEdit?`<fieldset><legend>Tramitação do processo</legend>
        <div id="hist_tram"><p class="muted small" style="margin:0">Carregando histórico…</p></div>
        <button type="button" class="btn ghost sm" id="add_trat_proc" style="margin-top:10px">+ Inserir tratativa</button>
      </fieldset>`:''}

      <fieldset><legend>Situação e observações</legend>
        <div class="frow">
          <div><label class="f">Situação</label><select id="status">${stOpt}</select></div>
          <div style="display:flex;align-items:flex-end"><label class="check"><input type="checkbox" id="gera_recomendacao" ${p.gera_recomendacao?'checked':''}>

      ${isEdit?'<button class="btn danger" id="del">Excluir</button>':''}

      <button class="btn primary" id="save">${isEdit?'Salvar alterações':'Cadastrar processo'}</button>

  </div></div>`;

  const close=()=>{modalRoot.innerHTML="";};
  $("#mx").onclick=close;$("#cancel").onclick=close;

  // Subárea dependente da área
  function fillSub(){

    const subs=AUX.taxonomia.filter(t=>t.area===area);
    $("#subarea").innerHTML=`<option value="">${area?'Selecione…':'Selecione uma área primeiro'}</option>`+
      subs.map(s=>`<option ${s.subarea===p.subarea?'selected':''}>${esc(s.subarea)}</option>`).join("");
  }
  fillSub();
  $("#area").onchange=()=>{fillSub();$("#desc_sub").classList.remove("show");};
  function onSub(){
    const sub=$("#subarea").value, area=$("#area").value;
    const t=AUX.taxonomia.find(x=>x.area===area && x.subarea===sub);
    const box=$("#desc_sub");
    if(t){box.textContent=t.descricao||"";box.classList.toggle("show",!!t.descricao);
      if(t.ods){const el=$(`.odsopt[data-ods="${t.ods}"]`);if(el)el.classList.add("on");}}
    else box.classList.remove("show");
  }
  $("#subarea").onchange=onSub;
  if(p.subarea)onSub();

  // ODS toggle
  $("#odsbox").addEventListener("click",e=>{const o=e.target.closest(".odsopt");if(o)o.classList.toggle("on");});
  // ---------- HISTÓRICO DE TRAMITAÇÃO (somente leitura) ----------
  async function pintaHistorico(){
    const box=$("#hist_tram");
    if(!box)return;
    const [rt,ro]=await Promise.all([
      sb.from("tratativas").select("*").eq("processo_id",p.id).order("data",{ascending:false}),
      sb.from("observacoes").select("*").eq("processo_id",p.id).order("data",{ascending:false})
    ]);
    const T=(rt.data||[]).map(x=>Object.assign({_k:"t"},x));
    const O=(ro.data||[]).map(x=>Object.assign({_k:"o"},x));
    const tudo=T.concat(O).sort((a,b)=>String(b.data||"").localeCompare(String(a.data||"")));
    if(!tudo.length){box.innerHTML=`<p class="muted small" style="margin:0">Nenhuma tratativa registrada. Use o botão abaixo ou a aba <b>Tramitação Processual</b>.</p>`;return;}
    box.innerHTML=tudo.map(x=>x._k==="t"
      ? `<div class="trat">${x.tipo?`<span class="chip blue">${esc(x.tipo)}</span> `:''}${esc(x.texto)}<div class="meta">${esc(x.autor||'—')} · ${fmtDate(x.data)}</div></div>`
      : `<div class="trat" style="border-left-color:var(--amarelo);background:#fffdf5"><span class="chip amber">Observação</span> ${esc(x.texto)}<div class="meta">${esc(x.autor||'—')} · ${fmtDate(x.data)}</div></div>`
    ).join("");
  }
  if(isEdit && p.id){
    pintaHistorico();
    const bt=$("#add_trat_proc");
    if(bt)bt.onclick=()=>formTratativa(p.id,async()=>{
      await pintaHistorico();
      // reflete no formulário aberto o que a tratativa alterou
      const {data:atual}=await sb.from("processos")
        .select("doc_tipo,doc_numero,doc_data_saida,status,updated_at").eq("id",p.id).single();
      if(atual){
        if(atual.doc_tipo)$("#doc_tipo").value=atual.doc_tipo;
        if(atual.doc_numero)$("#doc_numero").value=atual.doc_numero;
        if(atual.doc_data_saida)$("#doc_data_saida").value=atual.doc_data_saida;
        if(atual.status)$("#status").value=atual.status;
        p.updated_at=atual.updated_at;  // mantém a trava de concorrência coerente
      }
    });
  }

  // ---------- MANIFESTAÇÕES (desmembramento) ----------
  let MANIFS=[];
  const orgListOpts=[...AUX.orgaos].sort(byPt('sigla'))
    .map(o=>{const v=`${o.sigla} — ${o.nome}`;return `<option value="${esc(v)}">${esc(v)}</option>`;}).join("");
  const stListOpts=[...AUX.status].sort(byPt()).map(s=>`<option>${esc(s)}</option>`).join("");
  const areaListOpts=[...new Set(AUX.taxonomia.map(t=>t.area))].sort(byPt()).map(a=>`<option>${esc(a)}</option>`).join("");

  function pintaManifs(){
    const box=$("#manif_list");
    if(!MANIFS.length){
      box.innerHTML=`<p class="muted small" style="margin:0 0 10px">Nenhuma manifestação cadastrada. Ao salvar sem nenhuma, o processo conta como <b>1 manifestação</b>.</p>`;
    }else{
      box.innerHTML=MANIFS.map((m,i)=>`
        <div class="manif" data-i="${i}">
          <div class="manif-head">
            <span class="manif-num">${i+1}</span>
            <b style="font-size:13px">Manifestação ${i+1}</b>
            <span class="manif-acoes">
              <button type="button" class="btn ghost sm" data-dup="${i}" title="Repetir esta manifestação para outro órgão">Duplicar</button>
              <button type="button" class="btn danger sm" data-del="${i}">Remover</button>
            </span>
          </div>
          <div class="frow">
            <div><label class="f">Órgão demandado<span class="hint">Pode repetir o mesmo órgão de outra manifestação.</span></label>
              <select data-c="orgao" data-i="${i}"><option value="">Selecione…</option>${orgListOpts}</select></div>
            <div><label class="f">Situação</label>
              <select data-c="status" data-i="${i}"><option value="">Mesma do processo</option>${stListOpts}</select></div>
          </div>
          <div class="frow one"><div><label class="f">Objeto da manifestação</label>
            <textarea data-c="descricao" data-i="${i}" placeholder="Descreva o que está sendo demandado deste órgão">${esc(m.descricao||'')}</textarea></div></div>
          <div class="frow three">
            <div><label class="f">Área</label>
              <select data-c="area" data-i="${i}"><option value="">Selecione…</option>${areaListOpts}</select></div>
            <div><label class="f">Subárea</label>
              <select data-c="subarea" data-i="${i}"><option value="">Selecione a área primeiro</option></select></div>
            <div><label class="f">Prazo</label><input type="date" data-c="prazo" data-i="${i}" value="${esc(m.prazo||'')}"></div>
          </div>
          <div class="desc-sub" data-desc="${i}"></div>
          <label class="f">ODS vinculado(s)<span class="hint">A subárea marca o ODS correspondente; clique para (des)marcar.</span></label>
          <div class="odsbox" data-odsbox="${i}">${
            (AUX.ods||[]).map(o=>`<span class="odsopt ${(m.ods||[]).map(Number).includes(o.numero)?'on':''}" data-ods="${o.numero}" data-i="${i}" title="${esc(o.descricao||'')}">${o.numero} · ${esc(o.nome)}</span>`).join("")
          }</div>
        </div>`).join("");
      // repõe os valores selecionados e monta as subáreas dependentes
      MANIFS.forEach((m,i)=>{
        const g=c=>box.querySelector(`[data-c="${c}"][data-i="${i}"]`);
