        if(g("status"))g("status").value=m.status||"";
        if(g("area")){g("area").value=m.area||"";}
        preencheSubarea(i,m.subarea||"");
        mostraDescSub(i);
      });
    }
    const t=$("#manif_total");
    if(t)t.textContent=MANIFS.length?`${MANIFS.length} manifestação(ões) neste processo`:"";
  }

  // subárea dependente da área, dentro de cada manifestação
  function preencheSubarea(i,valor){
    const box=$("#manif_list");if(!box)return;
    const selA=box.querySelector(`[data-c="area"][data-i="${i}"]`);
    const selS=box.querySelector(`[data-c="subarea"][data-i="${i}"]`);
    if(!selA||!selS)return;
    const area=selA.value;
    const subs=AUX.taxonomia.filter(t=>t.area===area);
    selS.innerHTML=`<option value="">${area?'Selecione…':'Selecione a área primeiro'}</option>`+
      subs.map(s=>`<option>${esc(s.subarea)}</option>`).join("");
    if(valor)selS.value=valor;
  }
  function mostraDescSub(i){
    const box=$("#manif_list");if(!box)return;
    const d=box.querySelector(`[data-desc="${i}"]`);if(!d)return;
    const m=MANIFS[i]||{};
    const t=AUX.taxonomia.find(x=>x.area===m.area&&x.subarea===m.subarea);
    if(t&&t.descricao){d.textContent=t.descricao;d.classList.add("show");}
    else{d.classList.remove("show");}
  }
  function marcaOdsDaSubarea(i){
    const box=$("#manif_list");if(!box)return;
    const m=MANIFS[i]||{};
    const t=AUX.taxonomia.find(x=>x.area===m.area&&x.subarea===m.subarea);
    if(!t||!t.ods)return;
    const chip=box.querySelector(`[data-odsbox="${i}"] .odsopt[data-ods="${t.ods}"]`);
    if(chip)chip.classList.add("on");
    m.ods=[...new Set([...(m.ods||[]).map(Number),Number(t.ods)])];
  }

  $("#add_manif").onclick=()=>{MANIFS.push({orgao:"",descricao:"",status:"",area:"",subarea:"",ods:[],prazo:""});pintaManifs();};
  $("#manif_list").addEventListener("click",e=>{
    const ods=e.target.closest(".odsopt");
    if(ods){
      const i=Number(ods.dataset.i);
      ods.classList.toggle("on");
      MANIFS[i].ods=[...$("#manif_list").querySelectorAll(`[data-odsbox="${i}"] .odsopt.on`)]
        .map(x=>Number(x.dataset.ods));
      return;
    }
    const dup=e.target.closest("[data-dup]"), del=e.target.closest("[data-del]");
    if(dup){const i=Number(dup.dataset.dup);
      MANIFS.splice(i+1,0,Object.assign({},MANIFS[i],{id:null,orgao:""}));pintaManifs();
      toast("Manifestação duplicada — escolha o órgão de destino.");}
    if(del){const i=Number(del.dataset.del);
      if(confirm("Remover esta manifestação?")){MANIFS.splice(i,1);pintaManifs();}}
  });
  $("#manif_list").addEventListener("input",e=>{
    const el=e.target.closest("[data-c]");if(!el)return;
    MANIFS[Number(el.dataset.i)][el.dataset.c]=el.value;
  });
  $("#manif_list").addEventListener("change",e=>{
    const el=e.target.closest("[data-c]");if(!el)return;
    const i=Number(el.dataset.i), c=el.dataset.c;
    MANIFS[i][c]=el.value;
    if(c==="area"){MANIFS[i].subarea="";preencheSubarea(i,"");mostraDescSub(i);}
    if(c==="subarea"){mostraDescSub(i);marcaOdsDaSubarea(i);}
  });

  // carrega as manifestações existentes; se não houver, deriva dos órgãos já cadastrados
  if(isEdit && p.id){
    sb.from("manifestacoes").select("*").eq("processo_id",p.id).order("sequencia")
      .then(({data})=>{
        if(data&&data.length){MANIFS=data.map(m=>({id:m.id,orgao:m.orgao||"",descricao:m.descricao||"",
          status:m.status||"",area:m.area||"",subarea:m.subarea||"",ods:(m.ods||[]).map(Number),prazo:m.prazo||""}));}
        else{const antigos=(p.orgaos&&p.orgaos.length)?p.orgaos:String(p.orgao_demandado||"").split("; ").filter(Boolean);
          MANIFS=antigos.map(o=>({orgao:o,descricao:"",status:"",
            area:p.area||"",subarea:p.subarea||"",ods:(p.ods||[]).map(Number),prazo:""}));}
        pintaManifs();
      });
  }else{ pintaManifs(); }

  // ---------- INTEGRAÇÃO CGM ----------
  let admiss = null;      // dados do juízo de admissibilidade (memória)
  let admissCodigo = p.cgm_codigo || null;

  // grava o juízo: cria se ainda não existe, atualiza se já existe
  async function salvarAdmiss(procId){
    if(!admiss) return null;
    const dados=Object.assign({},admiss,{processo_id:procId,updated_at:new Date().toISOString()});
    delete dados.id; delete dados.codigo; delete dados.created_at;
    if(admiss.id){ // JÁ EXISTE → atualiza
      const {data,error}=await sb.from("admissibilidade_cgm")
        .update(dados).eq("id",admiss.id).select("id,codigo").single();
      if(error){toast("Falha ao atualizar a admissibilidade: "+error.message);return null;}
      if(data){admiss.id=data.id;admiss.codigo=data.codigo;
        toast("Admissibilidade atualizada · "+data.codigo);return data;}
      return null;
    }
    // NÃO EXISTE → cria e gera o identificador
    const {data,error}=await sb.from("admissibilidade_cgm")
      .insert(dados).select("id,codigo").single();
    if(error){toast("Falha ao criar o vínculo CGM: "+error.message);return null;}
    if(data){
      await sb.from("processos").update({cgm_codigo:data.codigo}).eq("id",procId);
      admiss.id=data.id;admiss.codigo=data.codigo;
      toast("Vínculo CGM criado · "+data.codigo);
      return data;
    }
    return null;
  }

  function pintaResumoCGM(){
    const box=$("#cgm_resumo");
    if(!$("#vinculo_cgm").checked){box.innerHTML="";return;}
    if(!admiss && !admissCodigo){
      box.innerHTML=`<div class="cgm-box"><h4>Habilitação pendente</h4>
        <p class="muted small" style="margin:0 0 10px">Preencha os critérios de habilitação para validar o encaminhamento à CGM.</p>
        <button type="button" class="btn primary sm" id="abrir_adm">Preencher critérios de habilitação</button></div>`;
    }else{
      const a=admiss||{};
      const res=a.resultado||"—", pri=a.prioridade||"—", pt=(a.pontuacao!=null?a.pontuacao:"—");
      const hab=a.habilitacao||a.resultado||null;
      const extra=[a.tipo_irregularidade?esc(a.tipo_irregularidade):null,
        a.valor_estimado?("R$ "+Number(a.valor_estimado).toLocaleString('pt-BR',{minimumFractionDigits:2})):null,
        a.responsavel?("Analista: "+esc(a.responsavel)):null].filter(Boolean).join(" · ");
      box.innerHTML=`<div class="cgm-box">
        <h4>Vínculo com a CGM</h4>
        ${admissCodigo?`<div class="codigo" id="cod_cgm">${esc(admissCodigo)}</div>
           <button type="button" class="btn ghost sm" id="copiar_cod" style="margin-left:8px">Copiar</button>`
          :`<p class="muted small" style="margin:0">O identificador único será gerado ao salvar o processo.</p>`}
        <div class="placar" style="margin-top:10px">
          <span class="veredito ${(hab||res)==='Habilitada'?'ok':'no'}">${esc(hab||res||'—')}</span>
          <span class="muted small">Prioridade: <b>${esc(pri)}</b></span>
          <span class="muted small">Pontuação: <b>${pt}/12</b></span>
          <button type="button" class="btn ghost sm" id="abrir_adm" style="margin-left:auto">Rever critérios</button>
        </div>
        ${extra?`<p class="muted small" style="margin:8px 0 0">${extra}</p>`:''}
        ${a.fundamentacao?`<p class="muted small" style="margin:4px 0 0">Fundamentação: ${esc(a.fundamentacao)}</p>`:''}
        </div>`;
      const cp=$("#copiar_cod");
      if(cp)cp.onclick=()=>{navigator.clipboard.writeText(admissCodigo);toast("Identificador copiado.");};
    }
    const b=$("#abrir_adm");
    if(b)b.onclick=()=>formAdmissibilidade(admiss,async(dados)=>{
      // preserva id/codigo já existentes ao reescrever os dados
      admiss=Object.assign({},dados,{id:(admiss&&admiss.id)||null,codigo:(admiss&&admiss.codigo)||null});
      if(!admiss.id)delete admiss.id;
      // processo já salvo? grava na hora. Senão, grava junto com o processo.
      if(isEdit && p.id){const r=await salvarAdmiss(p.id);if(r&&r.codigo)admissCodigo=r.codigo;}
      pintaResumoCGM();
    });
  }

  $("#vinculo_cgm").addEventListener("change",e=>{
    if(e.target.checked){
      pintaResumoCGM();
      if(!admiss && !admissCodigo) formAdmissibilidade(null,(dados)=>{admiss=dados;pintaResumoCGM();});
    }else{
      if(admissCodigo && !confirm("Este processo já possui vínculo com a CGM ("+admissCodigo+"). Desmarcar remove o vínculo. Continuar?")){
        e.target.checked=true;return;
      }
      admiss=null;pintaResumoCGM();
    }
  });

  // carrega admissibilidade já existente (edição)
  if(isEdit && p.vinculo_cgm){
    sb.from("admissibilidade_cgm").select("*").eq("processo_id",p.id)
      .order("created_at",{ascending:false}).limit(1)
      .then(({data})=>{ if(data&&data.length){admiss=data[0];admissCodigo=data[0].codigo;} pintaResumoCGM(); });
  }else{ pintaResumoCGM(); }

  // Prédio público → substitui SEMPRE o endereço (mesmo quando o prédio não tem um cadastrado)
  let endAuto=false; // o endereço atual veio de um prédio, e não digitado pelo usuário?
  $("#predio").addEventListener("change",()=>{
    const o=$("#predio").selectedOptions[0];
    const end=(o&&o.dataset.end)||"", bai=(o&&o.dataset.bai)||"";
    const st=$("#geostatus");
    if(!o||!o.value){ // "Nenhum / não se aplica": limpa só o que foi preenchido automaticamente
      if(endAuto){$("#endereco").value="";$("#bairro").value="";
        $("#latitude").value="";$("#longitude").value="";st.textContent="sem coordenadas";}
      endAuto=false;return;
    }
    $("#endereco").value=end;   // se o prédio não tem endereço, esvazia (não deixa o do anterior)
    $("#bairro").value=bai;
    endAuto=true;
    $("#latitude").value="";$("#longitude").value="";
    if(end){st.textContent="endereço do prédio preenchido — será localizado ao salvar";}
    else{
      st.textContent="⚠ este prédio não tem endereço cadastrado — informe a rua e o número";
      $("#endereco").focus();
    }
  });
  // se o usuário digitar o endereço à mão, ele deixa de ser automático
  $("#endereco").addEventListener("input",()=>{endAuto=false;});
  // Prazo automático (20/30 dias) a partir da data de entrada
  function pintaMemoria(){
    const base=$("#data_entrada").value, box=$("#memoria_prazo");
    if(!box)return;
    box.innerHTML = base ? memoriaPrazo(base,$("#prorrogado").checked)
      : "Informe a data do protocolo para o sistema calcular o prazo.";
  }
  function recalcPrazo(){
    const base=$("#data_entrada").value;if(!base){pintaMemoria();return;}
    const r=$("#prorrogado").checked?prazoProrrogado(base,20,10):prazoLegal(base,20);
    if(r)$("#prazo_interno").value=r.fim;
    pintaMemoria();
  }
  $("#data_entrada").addEventListener("change",recalcPrazo);
  $("#prorrogado").addEventListener("change",recalcPrazo);
  $("#recalc").onclick=recalcPrazo;
  pintaMemoria();

  // SEI duplicado
  $("#numero_sei").addEventListener("blur",async()=>{
    const v=$("#numero_sei").value.trim();
    if(!v){$("#sei_warn").classList.remove("show");return;}
    const {data}=await sb.from("processos").select("id,servidor").eq("numero_sei",v).limit(2);
    const outro=(data||[]).find(x=>x.id!==p.id);
    const w=$("#sei_warn");
    if(outro){w.textContent="Já existe um processo com este número SEI"+
      (outro.servidor?" (responsável: "+outro.servidor+")":"")+". O sistema não permitirá duplicar.";}
    w.classList.toggle("show",!!outro);
  });

  // Tramitação externa
  $("#tramitacao_ext").addEventListener("change",e=>{
    if(e.target.checked && !$("#ultima_unidade").value) $("#ultima_unidade").value=$("#unidade_resp").value;
  });

  // Tipo de demanda → LAI
  function toggleLAI(){$("#lai_fs").classList.toggle("hidden",!isLAI($("#tipo_demanda").value));}
  $("#tipo_demanda").onchange=toggleLAI;
  // Motivos LAI dependentes da situação
  function fillMotivos(){
    const sit=$("#lai_situacao").value;
    const ms=AUX.lai_motivos.filter(m=>m.situacao===sit);
    $("#lai_motivo").innerHTML=`<option value="">${ms.length?'Selecione…':'—'}</option>`+
      ms.map(m=>`<option ${m.motivo===p.lai_motivo?'selected':''}>${esc(m.motivo)}</option>`).join("");
  }
  $("#lai_situacao").onchange=fillMotivos;
  if(p.lai_situacao)fillMotivos();

  // Geocodificação gratuita (Nominatim / OpenStreetMap)
  async function geocodificar(){
    const end=$("#endereco").value.trim(), bairro=$("#bairro").value.trim();
    if(!end && !bairro) return false;
    const q=[end,bairro,"Londrina - PR, Brasil"].filter(Boolean).join(", ");
    try{
      const r=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q="+encodeURIComponent(q));
      const j=await r.json();
      if(j && j.length){
        $("#latitude").value=(+j[0].lat).toFixed(6);
        $("#longitude").value=(+j[0].lon).toFixed(6);
        $("#geostatus").textContent="✓ "+(+j[0].lat).toFixed(5)+", "+(+j[0].lon).toFixed(5);
        return true;
      }
      $("#geostatus").textContent="endereço não encontrado";
    }catch(e){$("#geostatus").textContent="falha ao localizar";}
    return false;
  }
  $("#geobtn").onclick=async()=>{
    if(!$("#endereco").value.trim() && !$("#bairro").value.trim()){toast("Informe o endereço ou bairro.");return;}
    $("#geostatus").textContent="localizando…";await geocodificar();
  };

  // Salvar
  $("#save").onclick=async()=>{
    // se há endereço e ainda não há coordenadas, tenta localizar automaticamente
    if(($("#endereco").value.trim()||$("#bairro").value.trim()) && !$("#latitude").value){
      $("#save").textContent="Localizando endereço…";await geocodificar();
    }
    const manifValidas=MANIFS.filter(m=>(m.orgao||"").trim()||(m.descricao||"").trim());
    const orgaosSel=[...new Set(manifValidas.map(m=>m.orgao).filter(Boolean))];
    const rec={
      numero_sei:$("#numero_sei").value.trim()||null,
      data_entrada:$("#data_entrada").value||null,
      orgaos:orgaosSel,
      orgao_demandado:orgaosSel.join('; ')||null,
      n_manifestacoes:Math.max(1,manifValidas.length),
      tipo_demanda:$("#tipo_demanda").value||null,
      link_sei:$("#link_sei").value.trim()||null,
      endereco:$("#endereco").value.trim()||null,
      bairro:$("#bairro").value.trim()||null,
      latitude:$("#latitude").value?Number($("#latitude").value):null,
      longitude:$("#longitude").value?Number($("#longitude").value):null,
      area:$("#area").value||null,
      subarea:$("#subarea").value||null,
      ods:[...document.querySelectorAll("#odsbox .odsopt.on")].map(o=>Number(o.dataset.ods)),
      servidor:$("#servidor").value||null,
      unidade_resp:$("#unidade_resp").value||null,
      prazo_interno:$("#prazo_interno").value||null,
      prorrogado:$("#prorrogado").checked,
      predio:$("#predio").value||null,
      net_acatada:$("#net_acatada").checked,
      tramitacao_ext:$("#tramitacao_ext").checked,
      ultima_unidade:$("#ultima_unidade").value.trim()||null,
      doc_tipo:$("#doc_tipo").value||null,
      doc_numero:$("#doc_numero").value.trim()||null,
      doc_data_saida:$("#doc_data_saida").value||null,
      lai_situacao:isLAI($("#tipo_demanda").value)?($("#lai_situacao").value||null):null,
      lai_motivo:isLAI($("#tipo_demanda").value)?($("#lai_motivo").value||null):null,
      vinculo_cgm:$("#vinculo_cgm").checked,
      status:$("#status").value||"Em análise",
      gera_recomendacao:$("#gera_recomendacao").checked,
      observacoes:$("#observacoes").value.trim()||null,
      updated_at:new Date().toISOString()
    };
    $("#save").disabled=true;$("#save").textContent="Salvando…";
    let res;
    if(isEdit){
      // só grava se ninguém tiver alterado o processo depois que você o abriu
      let q=sb.from("processos").update(rec).eq("id",p.id);
      if(p.updated_at) q=q.eq("updated_at",p.updated_at);
      res=await q.select("id,updated_at");
      if(!res.error && (!res.data || !res.data.length)){
        // conflito: outra pessoa salvou antes
        const {data:atual}=await sb.from("processos")
          .select("servidor,status,updated_at").eq("id",p.id).single();
        $("#save").disabled=false;$("#save").textContent="Salvar alterações";
        const quando=atual&&atual.updated_at?new Date(atual.updated_at).toLocaleString('pt-BR'):"há instantes";
        const aviso=document.createElement("div");
        aviso.className="conflito";
        aviso.innerHTML="<b>Este processo foi alterado por outra pessoa</b> ("+esc(quando)+
          "). Para não sobrescrever o trabalho dela, suas alterações não foram gravadas.<br>"+
          "Feche e abra o processo novamente para ver a versão atual e refazer o que for necessário.";
        const corpo=document.querySelector(".modal-body");
        if(corpo){corpo.insertBefore(aviso,corpo.firstChild);corpo.scrollTop=0;}
        toast("Conflito de edição — nada foi sobrescrito.");
        return;
      }
      if(!res.error && res.data && res.data.length) res={data:res.data[0]};
    }else{
      res=await sb.from("processos").insert(rec).select("id,updated_at").single();
    }
    if(res.error){
      const dup=String(res.error.message||"").includes("ux_proc_sei")||res.error.code==="23505";
      toast(dup?"Já existe um processo com este número SEI.":"Erro ao salvar: "+res.error.message);
      $("#save").disabled=false;$("#save").textContent=isEdit?"Salvar alterações":"Cadastrar processo";return;
    }
    const procId=(res.data&&res.data.id)||p.id;

    // as gravações seguintes são independentes: rodam em paralelo (mais rápido)
    const tarefas=[];
    if(procId){
      tarefas.push((async()=>{
        await sb.from("manifestacoes").delete().eq("processo_id",procId);
        if(manifValidas.length){
          const linhas=manifValidas.map((m,i)=>({processo_id:procId,sequencia:i+1,
            orgao:m.orgao||null,descricao:m.descricao||null,status:m.status||null,
            area:m.area||null,subarea:m.subarea||null,ods:(m.ods||[]).map(Number),
            prazo:m.prazo||null}));
          const {error:em}=await sb.from("manifestacoes").insert(linhas);
          if(em)toast("Processo salvo, mas as manifestações falharam: "+em.message);
        }
      })());
    }
    if($("#vinculo_cgm").checked && admiss && procId){
      tarefas.push(salvarAdmiss(procId).then(r2=>{if(r2&&r2.codigo)admissCodigo=r2.codigo;}));
    }
    if(!$("#vinculo_cgm").checked && p.cgm_codigo){
      tarefas.push(sb.from("processos").update({cgm_codigo:null}).eq("id",procId));
    }
    if(tarefas.length) await Promise.all(tarefas);
    invalidarCache();
    close();toast(isEdit?"Processo atualizado.":"Processo cadastrado.");
    if(view==="painel")renderPainel();else fetchRows();
  };

  if(isEdit){$("#del").onclick=async()=>{
    if(!confirm("Excluir este processo e suas recomendações/tratativas?"))return;
    const {error}=await sb.from("processos").delete().eq("id",p.id);
    if(error){toast("Erro: "+error.message);return;}
    invalidarCache();close();toast("Processo excluído.");fetchRows();
  };}
}

/* ============ JUÍZO DE ADMISSIBILIDADE — INTEGRAÇÃO CGM ============ */
const REQS=[
 ["req_competencia","Competência do Município",
  "O fato narrado é de competência da Administração Pública Municipal de Londrina."],
 ["req_fato","Descrição objetiva do fato",
  "Há narrativa que permita identificar o quê, quando e onde ocorreu (materialidade)."],
 ["req_autoria","Autoria ou unidade identificável",
  "Há indicação de autoria ou de órgão/unidade responsável pelo fato."],
 ["req_duplicidade","Ausência de duplicidade",
  "O fato não está sendo apurado em outro processo já em curso."],
 ["req_prescricao","Fato passível de apuração",
  "O fato não está prescrito nem exaurido para fins de apuração."]
];
const CRITS=[
 ["c_materialidade","Materialidade","Expressão financeira envolvida.",
  ["Sem valor identificado","Até R$ 50 mil","De R$ 50 mil a R$ 500 mil","Acima de R$ 500 mil"]],
 ["c_relevancia","Relevância","Impacto sobre o serviço público e a população atendida.",
  ["Baixa — efeito pontual","Média — afeta uma unidade","Alta — afeta política pública","Crítica — serviço essencial"]],
 ["c_criticidade","Criticidade","Gravidade da irregularidade indicada.",
  ["Sem indício de dano","Irregularidade formal","Indício de dano ao erário","Indício de fraude ou improbidade"]],
 ["c_verossimilhanca","Verossimilhança","Elementos que sustentam o relato.",
  ["Sem elementos","Relato circunstanciado","Com documentos","Com provas robustas"]]
];
// hipóteses próprias de outras tipologias — não se aplicam a denúncias
const HIP_FORA_DENUNCIA=[/Recurso LAI/i,/Dados pessoais inconsistentes/i,/Dentro do prazo contido na Carta de Servi/i];
function hipAplicavel(nome){return !HIP_FORA_DENUNCIA.some(rx=>rx.test(nome||""));}
function hipotesesInab(){
  const l=(AUX.hipoteses_inabilit&&AUX.hipoteses_inabilit.length)?AUX.hipoteses_inabilit:[];
  const base = l.length? l : (AUX.taxonomia||[])
    .filter(t=>t.area==="Gestão de manifestações"&&/^Não habilitada/.test(t.subarea||""))
    .map(t=>({nome:String(t.subarea).replace(/^Não habilitada\s*-\s*/,""),fundamento:t.descricao||""}));
  return base.filter(x=>hipAplicavel(x.nome));
}
function calcAdmiss(d){
  const reqOk=REQS.every(r=>!!d[r[0]]);
  const pt=CRITS.reduce((s,c)=>s+(Number(d[c[0]])||0),0);
  const pri=pt<=3?"Baixa":pt<=6?"Média":pt<=9?"Alta":"Urgente";
  return {reqOk,pontuacao:pt,prioridade:pri,sugestao:reqOk?"Habilitada":"Inabilitada"};
}
function formAdmissibilidade(atual,onSave){
  const d=Object.assign({c_materialidade:0,c_relevancia:0,c_criticidade:0,c_verossimilhanca:0},atual||{});
  const tipoOpt=`<option value="">Selecione…</option>`+[...(AUX.tipos_irregularidade||[])].sort(byPt())
    .map(t=>`<option ${t===d.tipo_irregularidade?'selected':''}>${esc(t)}</option>`).join("");
  const respOpt=`<option value="">Selecione…</option>`+[...AUX.servidores].sort(byPt('nome'))
    .map(s=>`<option ${s.nome===d.responsavel?'selected':''}>${esc(s.nome)}</option>`).join("");
  modalRoot.innerHTML=`<div class="overlay"><div class="modal" style="max-width:860px">
    <div class="modal-head"><h3>Critérios de Habilitação</h3><button class="x" id="mx">×</button></div>
    <div class="modal-body">
      <p class="lead">Esta tela <b>habilita ou inabilita</b> denúncias que poderão ser encaminhadas à Controladoria-Geral do Município. O juízo de <b>admissibilidade</b> será realizado, em momento posterior, pela própria CGM, tendo esta habilitação como subsídio. Ao salvar, o sistema gera um <b>identificador único</b> que permite à Controladoria rastrear a demanda de ponta a ponta.</p>

      <fieldset><legend>1. Hipóteses de inabilitação</legend>
        <p class="muted small" style="margin:0 0 10px">Marque as hipóteses que se aplicam. Havendo qualquer hipótese marcada, a denúncia é <b>inabilitada</b> e não é encaminhada à CGM.</p>
        <div id="hip_list">${hipotesesInab().map((x,i)=>`
          <label class="check" style="padding:7px 0;border-bottom:1px dashed var(--linha)">
            <input type="checkbox" class="hip" data-nome="${esc(x.nome)}" ${(d.hipoteses_inabilit||[]).includes(x.nome)?'checked':''}>
            <span>${esc(x.nome)}<span class="hint">${esc(x.fundamento||'')}</span></span></label>`).join("")}
        </div>
        <div class="placar" id="placar_hab" style="margin-top:12px"></div>
        <div class="frow one" style="margin-top:12px">
          <div><label class="f">Motivo da inabilitação<span class="hint">Preenchido automaticamente com as hipóteses marcadas.</span></label>
            <input id="motivo_inab" value="${esc(d.motivo_inabilitacao||'')}"></div>
        </div>
      </fieldset>

      <fieldset id="fs_admiss"><legend>2. Requisitos de habilitação</legend>
        <p class="muted small" style="margin:0 0 10px">Todos os requisitos precisam ser atendidos para que a denúncia seja <b>habilitada</b>. A ausência de qualquer um deles conduz à <b>inabilitação</b>.</p>
        ${REQS.map(r=>`<div class="crit"><div><b>${esc(r[1])}</b><span class="desc">${esc(r[2])}</span></div>
          <div class="simnao" data-req="${r[0]}">
            <button type="button" class="sim ${d[r[0]]===true?'on':''}" data-v="1">Sim</button>
            <button type="button" class="nao ${d[r[0]]===false&&atual?'on':''}" data-v="0">Não</button>
          </div></div>`).join("")}
      </fieldset>

      <fieldset><legend>3. Critérios de priorização — subsídio à CGM</legend>
        <p class="muted small" style="margin:0 0 10px">Não interferem na habilitação. Servem de subsídio para a Controladoria priorizar a apuração.</p>
        ${CRITS.map(c=>`<div class="frow one" style="margin-bottom:10px"><div>
          <label class="f">${esc(c[1])}<span class="hint">${esc(c[2])}</span></label>
          <select id="${c[0]}">${c[3].map((o,i)=>`<option value="${i}" ${Number(d[c[0]])===i?'selected':''}>${i} — ${esc(o)}</option>`).join("")}</select>
        </div></div>`).join("")}
      </fieldset>

      <fieldset><legend>4. Enquadramento e decisão da Ouvidoria</legend>
        <div class="frow">
          <div><label class="f">Tipo de irregularidade</label><select id="tipo_irreg">${tipoOpt}</select></div>
          <div><label class="f">Valor estimado (R$)</label><input type="number" step="0.01" id="valor_est" value="${esc(d.valor_estimado??'')}"></div>
        </div>
        <div class="placar" id="placar"></div>
        <div class="frow" style="margin-top:12px">
          <div><label class="f">Decisão da Ouvidoria<span class="hint">O sistema sugere com base nos blocos 1 e 2; a decisão final é do analista.</span></label>
            <select id="resultado"><option>Habilitada</option><option>Inabilitada</option></select></div>
          <div><label class="f">Responsável pela análise</label><select id="responsavel">${respOpt}</select></div>
        </div>
        <div class="frow one"><div><label class="f">Fundamentação<span class="hint">Obrigatória quando a decisão divergir da sugestão do sistema.</span></label>
          <textarea id="fundamentacao" class="tall">${esc(d.fundamentacao||'')}</textarea></div></div>
      </fieldset>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="cancel">Cancelar</button>
      <button class="btn primary" id="save">Validar e vincular</button>
    </div>
  </div></div>`;

  const close=()=>modalRoot.innerHTML="";
  $("#mx").onclick=close;$("#cancel").onclick=close;

  // ---- habilitação ----
  function hipMarcadas(){return [...document.querySelectorAll(".hip:checked")].map(x=>x.dataset.nome);}
  function atualizaHab(){
    const marcadas=hipMarcadas();
    const inab=marcadas.length>0;
    const box=$("#placar_hab");
    box.innerHTML=`<span class="veredito ${inab?'no':'ok'}">${inab?'Inabilitada':'Sem hipótese de inabilitação'}</span>
      <span class="muted small">${inab?marcadas.length+' hipótese(s) marcada(s)':'A habilitação depende dos requisitos do bloco 2.'}</span>`;
    $("#motivo_inab").value=marcadas.join("; ");
    // hipótese marcada: os blocos seguintes deixam de ser determinantes
    const fs=$("#fs_admiss");
    const seguintes=[fs,fs&&fs.nextElementSibling,fs&&fs.nextElementSibling&&fs.nextElementSibling.nextElementSibling];
    seguintes.forEach(el=>{if(el&&el.tagName==="FIELDSET")el.style.opacity=inab?".45":"1";});
    return {inab,marcadas};
  }
  document.querySelectorAll(".hip").forEach(c=>c.addEventListener("change",()=>{atualizaHab();atualizar();}));
  atualizaHab();

  // botões Sim/Não
  document.querySelectorAll("[data-req]").forEach(g=>{
    g.addEventListener("click",e=>{
      const b=e.target.closest("button");if(!b)return;
      g.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      d[g.dataset.req] = b.dataset.v==="1";
      atualizar();
    });
  });
  CRITS.forEach(c=>$("#"+c[0]).addEventListener("change",()=>{d[c[0]]=Number($("#"+c[0]).value);atualizar();}));

  function atualizar(){
    const marcadas=hipMarcadas();
    const r=calcAdmiss(d);
    const sug = marcadas.length? "Inabilitada" : r.sugestao;
    const faltam=REQS.filter(x=>d[x[0]]===undefined).length;
    $("#placar").innerHTML=`
      <span class="veredito ${sug==='Habilitada'?'ok':'no'}">Sugestão: ${sug}</span>
      ${marcadas.length?`<span class="muted small">por hipótese de inabilitação</span>`
        :`<span><span class="big">${r.pontuacao}</span><span class="muted small">/12</span></span>
          <span class="muted small">Prioridade sugerida: <b>${r.prioridade}</b></span>`}
      ${(!marcadas.length&&faltam)?`<span class="muted small" style="margin-left:auto">${faltam} requisito(s) sem resposta</span>`:''}`;
    if(!$("#resultado").dataset.tocado)$("#resultado").value=sug;
  }
  $("#resultado").addEventListener("change",e=>{e.target.dataset.tocado="1";});
  atualizar();

  $("#save").onclick=()=>{
    const inabilitada=$("#resultado").value==="Inabilitada";
    const faltam=REQS.filter(x=>d[x[0]]===undefined);
    if(!inabilitada && faltam.length){toast("Responda todos os requisitos de habilitação.");return;}
    if(inabilitada && !hipMarcadas().length && !$("#fundamentacao").value.trim()){
      toast("Marque a hipótese de inabilitação ou fundamente a decisão.");return;}
    const r=calcAdmiss(d);
    const sugerido=hipMarcadas().length?"Inabilitada":r.sugestao;
    const decisao=$("#resultado").value;
    const divergente=decisao!==sugerido;
    const fund=$("#fundamentacao").value.trim();
    if(divergente && !fund){toast("A decisão divergiu da sugestão — a fundamentação é obrigatória.");$("#fundamentacao").focus();return;}
    if(!$("#responsavel").value){toast("Informe o responsável pela análise.");return;}
    const dados={
      habilitacao:$("#resultado").value,
      hipoteses_inabilit:hipMarcadas(),
      motivo_inabilitacao:$("#motivo_inab").value.trim()||null,
      req_competencia:!!d.req_competencia, req_fato:!!d.req_fato, req_autoria:!!d.req_autoria,
      req_duplicidade:!!d.req_duplicidade, req_prescricao:!!d.req_prescricao,
      c_materialidade:Number(d.c_materialidade)||0, c_relevancia:Number(d.c_relevancia)||0,
      c_criticidade:Number(d.c_criticidade)||0, c_verossimilhanca:Number(d.c_verossimilhanca)||0,
      pontuacao:r.pontuacao, prioridade:r.prioridade,
      tipo_irregularidade:$("#tipo_irreg").value||null,
      valor_estimado:$("#valor_est").value?Number($("#valor_est").value):null,
      resultado:decisao, resultado_manual:divergente,
      fundamentacao:fund||null, responsavel:$("#responsavel").value,
      data_analise:today()
    };
    close();
    toast("Habilitação registrada — salve o processo para gerar o identificador.");
    if(onSave)onSave(dados);
  };
}

/* ================= TRAMITAÇÃO PROCESSUAL ================= */
let filtroTram={orgao:"",servidor:"",status:""};
let TRAM={R:[],T:[],O:[]};
async function renderRecomendacoes(){
  app.innerHTML=`<div class="empty">Carregando…</div>`;
  // traz só os processos com tramitação (ou marcados para gerar recomendação), no máximo 200
  const {data:plist}=await sb.from("processos")
    .select("id,numero_sei,area,subarea,servidor,status,orgao_demandado,orgaos,link_sei,net_acatada,gera_recomendacao")
    .order("created_at",{ascending:false}).limit(200);
  PROCESSOS=plist||[];
  const ids=PROCESSOS.map(p=>p.id);
  let R=[],T=[],O=[];
  if(ids.length){
    const [r1,r2,r3]=await Promise.all([
      sb.from("recomendacoes").select("*").in("processo_id",ids).order("created_at",{ascending:false}),
      sb.from("tratativas").select("*").in("processo_id",ids).order("data",{ascending:true}),
      sb.from("observacoes").select("*").in("processo_id",ids).order("data",{ascending:true})
    ]);
    R=r1.data||[];T=r2.data||[];O=r3.data||[];
  }
  TRAM={R,T,O};
  const servOpts=[...AUX.servidores].sort(byPt('nome')).map(s=>`<option>${esc(s.nome)}</option>`).join("");
  const orgOpts=[...AUX.orgaos].sort(byPt('sigla')).map(o=>`<option value="${esc(o.sigla)}">${esc(o.sigla)} — ${esc(o.nome)}</option>`).join("");
  const statusOpts=[...AUX.status].sort(byPt()).map(s=>`<option>${esc(s)}</option>`).join("");
  const procOpt=[...PROCESSOS].sort(byPt('numero_sei')).map(p=>`<option value="${p.id}">${esc(p.numero_sei||'(sem SEI)')} — ${esc(p.subarea||p.area||'')}</option>`).join("");
  app.innerHTML=`<div class="card pad">
    <div class="toolbar">
      <h2 class="sec" style="margin-right:auto">Tramitação Processual</h2>
      <select id="rproc"><option value="">Selecione um processo…</option>${procOpt}</select>
      <button class="btn primary" id="addtrat" disabled>Inserir Tratativa</button>
      <button class="btn ghost" id="addobs" disabled>Incluir Observações</button>
    </div>
    <div class="toolbar">
      <select id="tforgao"><option value="">Todos os órgãos</option>${orgOpts}</select>
      <select id="tfserv"><option value="">Todos os servidores</option>${servOpts}</select>
      <select id="tfstatus"><option value="">Todas as situações</option>${statusOpts}</select>
      <span class="muted small" style="margin-left:auto" id="tfcount"></span>
    </div>
    <p class="lead">Registre as tratativas, observações e recomendações de cada processo.</p>
    <div id="reclist"></div>
  </div>`;
  const sel=$("#rproc");
  sel.onchange=()=>{$("#addtrat").disabled=!sel.value;$("#addobs").disabled=!sel.value;};
  $("#addtrat").onclick=()=>{if(sel.value)formTratativa(sel.value,()=>renderRecomendacoes());};
  $("#addobs").onclick=()=>{if(sel.value)formObservacao(sel.value);};
  $("#tforgao").value=filtroTram.orgao;$("#tforgao").onchange=e=>{filtroTram.orgao=e.target.value;drawTram();};
  $("#tfserv").value=filtroTram.servidor;$("#tfserv").onchange=e=>{filtroTram.servidor=e.target.value;drawTram();};
  $("#tfstatus").value=filtroTram.status;$("#tfstatus").onchange=e=>{filtroTram.status=e.target.value;drawTram();};
  drawTram();
}
function drawTram(){
  const {R,T,O}=TRAM;
  let procCom=PROCESSOS.filter(p=>p.gera_recomendacao||R.some(r=>r.processo_id===p.id)||T.some(t=>t.processo_id===p.id)||O.some(o=>o.processo_id===p.id));
  procCom=procCom.filter(p=>{
    if(filtroTram.orgao && !String(p.orgao_demandado||"").includes(filtroTram.orgao))return false;
    if(filtroTram.servidor && p.servidor!==filtroTram.servidor)return false;
    if(filtroTram.status && p.status!==filtroTram.status)return false;
    return true;
  });
  const box=$("#reclist");if(!box)return;
  box.innerHTML=procCom.length?procCom.map(p=>blocoProcessoRec(p,R,T,O)).join("")
    :`<div class="empty">Nenhum processo encontrado com esses filtros. Selecione um processo acima e clique em <b>Inserir Tratativa</b>.</div>`;
  const c=$("#tfcount");if(c)c.textContent=procCom.length+" processo(s)";
  // checkbox NET acatada — grava direto no processo
  box.querySelectorAll("[data-net]").forEach(cb=>cb.onchange=async()=>{
    const id=cb.dataset.net;
    const {error}=await sb.from("processos").update({net_acatada:cb.checked,updated_at:new Date().toISOString()}).eq("id",id);
    if(error){toast("Erro: "+error.message);cb.checked=!cb.checked;return;}
    invalidarCache();
    const pr=PROCESSOS.find(x=>x.id===id);if(pr)pr.net_acatada=cb.checked;
    toast(cb.checked?"Notificação marcada como acatada.":"Marcação removida.");
  });
}
function blocoProcessoRec(p,R,T,O){
  O=O||[];
  const recs=R.filter(r=>r.processo_id===p.id);
  const tratsProc=T.filter(t=>t.processo_id===p.id);
  const obsProc=O.filter(o=>o.processo_id===p.id);
  const siglas=(p.orgaos&&p.orgaos.length?p.orgaos:String(p.orgao_demandado||'').split('; ')).filter(Boolean).map(o=>String(o).split(' — ')[0]).join(', ');
  return `<div class="card pad" style="margin-bottom:16px">
    <h3 style="margin:0 0 4px">${esc(p.numero_sei||'(sem SEI)')} ${p.link_sei?`<a href="${esc(p.link_sei)}" target="_blank" rel="noopener" class="small">🔗 SEI</a>`:''} <span class="muted small">· ${esc(p.subarea||p.area||'')}</span></h3>
    <div class="muted small" style="margin-bottom:8px">${servChip(p.servidor)} · ${esc(siglas||'sem órgão')} · ${statusChip(p.status)}</div>
    <label class="check" style="margin-bottom:10px"><input type="checkbox" data-net="${p.id}" ${p.net_acatada?'checked':''}>
      <span>Notificação / Nota de Esclarecimento Técnico acatada<span class="hint">Mesma marcação da edição do processo; alimenta o gráfico do Painel.</span></span></label>
    ${tratsProc.length?tratsProc.map(t=>`<div class="trat">${t.tipo?`<span class="chip blue">${esc(t.tipo)}</span> `:''}${esc(t.texto)}<div class="meta">${esc(t.autor||'—')} · ${fmtDate(t.data)}</div></div>`).join(""):''}
    ${obsProc.length?obsProc.map(o=>`<div class="trat" style="border-left-color:var(--amarelo);background:#fffdf5"><span class="chip amber">Observação</span> ${esc(o.texto)}<div class="meta">${esc(o.autor||'—')} · ${fmtDate(o.data)}</div></div>`).join(""):''}
    ${recs.length?recs.map(r=>`<div class="rec"><h4>${r.numero?esc('Recomendação Nº '+r.numero+' — '):'Recomendação — '}${esc(r.texto||'')}</h4>
        <div class="muted small">Destinatário(s): ${esc((r.destinatarios&&r.destinatarios.length)?r.destinatarios.map(d=>String(d).split(' — ')[0]).join(', '):'—')} · Emissão: ${fmtDate(r.data_emissao)} · ${statusChip(p.status)}</div>
        ${r.observacoes?`<div class="muted small" style="margin-top:4px">Obs.: ${esc(r.observacoes)}</div>`:''}
      </div>`).join(""):''}
    ${(!tratsProc.length&&!recs.length&&!obsProc.length)?`<p class="muted small">Sem registros de tramitação ainda.</p>`:''}
  </div>`;
}
function formObservacao(processoId){
  const autorOpt=`<option value="">Selecione…</option>`+[...AUX.servidores].sort(byPt('nome')).map(s=>`<option>${esc(s.nome)}</option>`).join("");
  modalRoot.innerHTML=`<div class="overlay"><div class="modal" style="max-width:620px">
    <div class="modal-head"><h3>Incluir Observações</h3><button class="x" id="mx">×</button></div>
    <div class="modal-body">
      <div class="frow one"><div><label class="f">Observações</label><textarea id="otexto" class="tall"></textarea></div></div>
      <div class="frow">
        <div><label class="f">Autor</label><select id="oautor">${autorOpt}</select></div>
        <div><label class="f">Data</label><input type="date" id="odata" value="${today()}"></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn ghost" id="cancel">Cancelar</button><button class="btn primary" id="save">Salvar</button></div>
  </div></div>`;
  const close=()=>modalRoot.innerHTML="";
  $("#mx").onclick=close;$("#cancel").onclick=close;
  $("#save").onclick=async()=>{
    const texto=$("#otexto").value.trim();
    if(!texto){toast("Escreva a observação.");return;}
    const rec={processo_id:processoId,texto,autor:$("#oautor").value||null,data:$("#odata").value||today()};
    const {error}=await sb.from("observacoes").insert(rec);
    if(error){toast("Erro: "+error.message);return;}
    close();toast("Observação registrada.");renderRecomendacoes();
  };
}
function formTratativa(processoId,aoSalvar){
  const proc=PROCESSOS.find(x=>x.id===processoId)||{};
  const tiposOpt=`<option value="">Selecione…</option>`+[...AUX.tipos_tratativa].sort(byPt()).map(t=>`<option>${esc(t)}</option>`).join("");
  const autorOpt=`<option value="">Selecione…</option>`+[...AUX.servidores].sort(byPt('nome')).map(s=>`<option>${esc(s.nome)}</option>`).join("");
  const stOpt=`<option value="">Manter a situação atual</option>`+[...AUX.status].sort(byPt()).map(s=>`<option>${esc(s)}</option>`).join("");
  modalRoot.innerHTML=`<div class="overlay"><div class="modal" style="max-width:660px">
    <div class="modal-head"><h3>Inserir Tratativa</h3><button class="x" id="mx">×</button></div>
    <div class="modal-body">
      <p class="lead" style="margin:0 0 12px">Processo <b>${esc(proc.numero_sei||'(sem SEI)')}</b>${proc.status?` · situação atual: ${statusChip(proc.status)}`:''}</p>
      <div class="frow">
        <div><label class="f">Tipo de tratativa<span class="hint">Gerencie a lista em Gestão do Sistema → Tipos de Tratativa.</span></label><select id="ttipo">${tiposOpt}</select></div>
        <div><label class="f">Data</label><input type="date" id="tdata" value="${today()}"></div>
      </div>
      <div class="frow one"><div><label class="f">Descrição / providência</label><textarea id="ttexto" class="tall"></textarea></div></div>
      <div class="frow">
        <div><label class="f">Autor</label><select id="tautor">${autorOpt}</select></div>
        <div><label class="f">Número do documento<span class="hint">Opcional — do documento emitido pela OGM.</span></label><input id="tnum"></div>
      </div>

      <fieldset style="margin-top:6px"><legend>Reflexo no processo</legend>
        <label class="check" style="margin-bottom:10px"><input type="checkbox" id="t_doc" checked>
          <span>Registrar como documento emitido pela OGM<span class="hint">Preenche o tipo, o número e a data de saída no cadastro do processo.</span></span></label>
        <div class="frow one"><div><label class="f">Atualizar a situação do processo</label><select id="t_status">${stOpt}</select></div></div>
      </fieldset>
    </div>
    <div class="modal-foot"><button class="btn ghost" id="cancel">Cancelar</button><button class="btn primary" id="save">Salvar</button></div>
  </div></div>`;
  const close=()=>modalRoot.innerHTML="";
  $("#mx").onclick=close;$("#cancel").onclick=close;

  // se o tipo da tratativa não for um documento da OGM, desmarca o registro automático
  $("#ttipo").addEventListener("change",()=>{
    const t=$("#ttipo").value;
    $("#t_doc").checked = !!t && (AUX.tipos_documento||[]).includes(t);
  });

  $("#save").onclick=async()=>{
    const texto=$("#ttexto").value.trim();
    if(!texto){toast("Descreva a tratativa.");return;}
    const btn=$("#save");btn.disabled=true;btn.textContent="Salvando…";
    const tipo=$("#ttipo").value||null, data=$("#tdata").value||today();
    const rec={processo_id:processoId,tipo,texto,autor:$("#tautor").value||null,data};
    const {error}=await sb.from("tratativas").insert(rec);
    if(error){toast("Erro: "+error.message);btn.disabled=false;btn.textContent="Salvar";return;}

    // ---- reflete no cadastro do processo ----
    const upd={};
    if($("#t_doc").checked && tipo && (AUX.tipos_documento||[]).includes(tipo)){
      upd.doc_tipo=tipo; upd.doc_data_saida=data;
      const n=$("#tnum").value.trim(); if(n)upd.doc_numero=n;
    }else if($("#tnum").value.trim()){ upd.doc_numero=$("#tnum").value.trim(); }
    if($("#t_status").value) upd.status=$("#t_status").value;
    if(Object.keys(upd).length){
      upd.updated_at=new Date().toISOString();
      const {error:eu}=await sb.from("processos").update(upd).eq("id",processoId);
      if(eu){toast("Tratativa salva, mas o processo não foi atualizado: "+eu.message);}
      else{
        const pr=PROCESSOS.find(x=>x.id===processoId);
        if(pr)Object.assign(pr,upd);
        toast("Tratativa registrada e processo atualizado.");
      }
    }else{ toast("Tratativa registrada."); }
    invalidarCache();   // painel e lista de processos passam a refletir a mudança
    close();
    if(aoSalvar)aoSalvar(); else renderRecomendacoes();
  };
}
function formRecomendacao(processoId){
  const proc=PROCESSOS.find(x=>x.id===processoId)||{};
  const orgsProc=(proc.orgaos&&proc.orgaos.length)?proc.orgaos:(proc.orgao_demandado?String(proc.orgao_demandado).split('; ').filter(Boolean):[]);
  const destSel=new Set(orgsProc);
  const destOpts=[...AUX.orgaos].sort(byPt('sigla')).map(o=>{const v=`${o.sigla} — ${o.nome}`;return `<span class="odsopt ${destSel.has(v)?'on':''}" data-org="${esc(v)}" title="${esc(v)}">${esc(o.sigla)}</span>`;}).join("");
  modalRoot.innerHTML=`<div class="overlay"><div class="modal" style="max-width:680px">
    <div class="modal-head"><h3>Nova recomendação</h3><button class="x" id="mx">×</button></div>
    <div class="modal-body">
      <div class="frow">
        <div><label class="f">Número da recomendação</label><input id="rnum" placeholder="Ex.: 001/2026"></div>
        <div><label class="f">Data de emissão</label><input type="date" id="rdata" value="${today()}"></div>
      </div>
      <div class="frow one"><div><label class="f">Descrição da recomendação</label><textarea id="rtexto" class="tall"></textarea></div></div>
      <label class="f">Órgão(s) destinatário(s)<span class="hint">Já vêm marcados os órgãos do processo; clique para incluir outros.</span></label>
      <div class="odsbox" id="destbox">${destOpts}</div>
      <div class="frow one" style="margin-top:12px"><div><label class="f">Observações</label><textarea id="robs"></textarea></div></div>
    </div>
    <div class="modal-foot"><button class="btn ghost" id="cancel">Cancelar</button><button class="btn primary" id="save">Salvar</button></div>
  </div></div>`;
  const close=()=>modalRoot.innerHTML="";
  $("#mx").onclick=close;$("#cancel").onclick=close;
  $("#destbox").addEventListener("click",e=>{const o=e.target.closest(".odsopt");if(o)o.classList.toggle("on");});
  $("#save").onclick=async()=>{
    const texto=$("#rtexto").value.trim();
    if(!texto){toast("Descreva a recomendação.");return;}
    const rec={processo_id:processoId,numero:$("#rnum").value.trim()||null,texto,
      destinatarios:[...document.querySelectorAll("#destbox .odsopt.on")].map(o=>o.dataset.org),
      data_emissao:$("#rdata").value||null,observacoes:$("#robs").value.trim()||null,status:'Aberta'};
    const {error}=await sb.from("recomendacoes").insert(rec);
    if(error){toast("Erro: "+error.message);return;}
    close();toast("Recomendação criada.");renderRecomendacoes();
  };
}

/* ================= TABELAS AUXILIARES ================= */
const AUXDEFS=[
  {key:"taxonomia",tbl:"aux_taxonomia",label:"Taxonomia",cols:[["area","Área"],["subarea","Subárea"],["descricao","Descrição"],["ods","ODS"]]},
  {key:"ods",tbl:"aux_ods",label:"ODS",cols:[["numero","Nº"],["nome","Objetivo"],["descricao","Descrição"]]},
  {key:"lai_motivos",tbl:"aux_lai_motivos",label:"Motivos LAI",cols:[["situacao","Situação"],["motivo","Motivo"],["descricao","Descrição"]]},
  {key:"servidores",tbl:"aux_servidores",label:"Servidores",cols:[["nome","Nome"],["unidade","Unidade"]]},
  {key:"unidades",tbl:"aux_unidades",label:"Unidades",cols:[["sigla","Sigla"],["nome","Nome"]]},
  {key:"orgaos",tbl:"aux_orgaos",label:"Órgãos",cols:[["sigla","Sigla"],["nome","Nome"]]},
  {key:"tipos_demanda",tbl:"aux_tipos_demanda",label:"Tipos de demanda",cols:[["nome","Nome"]],simple:true},
  {key:"tipos_documento",tbl:"aux_tipos_documento",label:"Tipos de documento",cols:[["nome","Nome"]],simple:true},
  {key:"status",tbl:"aux_status",label:"Situações",cols:[["nome","Nome"],["descricao","Descrição"]],simple:true},
  {key:"predios",tbl:"aux_predios",label:"Prédios Públicos",cols:[["nome","Nome"],["endereco","Endereço"],["bairro","Bairro"]]},
  {key:"tipos_tratativa",tbl:"aux_tipos_tratativa",label:"Tipos de Tratativa",cols:[["nome","Nome"]],simple:true},
  {key:"tipos_irregularidade",tbl:"aux_tipos_irregularidade",label:"Tipos de Irregularidade (CGM)",cols:[["nome","Nome"]],simple:true},
  {key:"feriados",tbl:"aux_feriados",label:"Feriados (exceções)",cols:[["data","Data"],["nome","Nome"],["tipo","Tipo"]]},
  {key:"hipoteses_inabilit",tbl:"aux_hipoteses_inabilitacao",label:"Hipóteses de Inabilitação",cols:[["nome","Hipótese"],["fundamento","Fundamento"]]},
];
let auxTab="taxonomia";
async function renderAuxiliares(){
  app.innerHTML=`<div class="card pad">
    <div class="toolbar">
      <h2 class="sec" style="margin-right:auto">Gestão do Sistema</h2>
      <button class="btn ghost" id="backup">⬇ Baixar backup</button>
      <button class="btn ghost" id="seed">Popular dados iniciais</button>
    </div>
    <div class="aux-tabs" id="auxtabs">${AUXDEFS.map(d=>`<button data-k="${d.key}" class="${d.key===auxTab?'on':''}">${d.label}</button>`).join("")}</div>
    <div id="auxbody"><div class="empty">Carregando…</div></div>
  </div>`;
  $("#auxtabs").onclick=e=>{const b=e.target.closest("button[data-k]");if(!b)return;auxTab=b.dataset.k;renderAuxiliares();};
  $("#seed").onclick=popularSeed;
  $("#backup").onclick=baixarBackup;
  drawAuxTable();
}
async function drawAuxTable(){
  const def=AUXDEFS.find(d=>d.key===auxTab);
  const {data,error}=await sb.from(def.tbl).select("*");
  const rows=error?[]:(data||[]);
  const body=$("#auxbody");
  body.innerHTML=`
    <div class="toolbar"><span class="muted small">${rows.length} registro(s)</span>
      <button class="btn primary sm" id="auxadd" style="margin-left:auto">+ Adicionar</button></div>
    <div class="tblwrap"><table><thead><tr>${def.cols.map(c=>`<th>${c[1]}</th>`).join("")}<th></th></tr></thead>
    <tbody>${rows.length?rows.map(r=>`<tr>${def.cols.map(c=>`<td>${esc(r[c[0]])}</td>`).join("")}
      <td style="white-space:nowrap"><button class="btn ghost sm" data-edit="${r.id}">Editar</button>
      <button class="btn danger sm" data-del="${r.id}">Excluir</button></td></tr>`).join("")
      :`<tr><td colspan="${def.cols.length+1}"><div class="empty">Vazia. Use <b>Popular dados iniciais</b> ou <b>+ Adicionar</b>.</div></td></tr>`}</tbody></table></div>`;
  $("#auxadd").onclick=()=>formAux(def);
  body.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>formAux(def,rows.find(r=>r.id===b.dataset.edit)));
  body.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Excluir registro?"))return;
    await sb.from(def.tbl).delete().eq("id",b.dataset.del);await loadAux();drawAuxTable();
  });
}
function formAux(def,row){
  row=row||{};const isEdit=!!row.id;
  modalRoot.innerHTML=`<div class="overlay"><div class="modal" style="max-width:600px">
    <div class="modal-head"><h3>${isEdit?'Editar':'Adicionar'} · ${def.label}</h3><button class="x" id="mx">×</button></div>
    <div class="modal-body">${def.cols.map(c=>`<div class="frow one"><div><label class="f">${c[1]}</label>
      ${c[0]==='descricao'?`<textarea id="c_${c[0]}">${esc(row[c[0]]||'')}</textarea>`
        :`<input id="c_${c[0]}" value="${esc(row[c[0]]??'')}">`}</div></div>`).join("")}</div>
    <div class="modal-foot"><button class="btn ghost" id="cancel">Cancelar</button><button class="btn primary" id="save">Salvar</button></div>
  </div></div>`;
  const close=()=>modalRoot.innerHTML="";
  $("#mx").onclick=close;$("#cancel").onclick=close;
  $("#save").onclick=async()=>{
    const rec={};def.cols.forEach(c=>{let v=$("#c_"+c[0]).value;if((c[0]==='numero'||c[0]==='ods')&&v!=='')v=Number(v);rec[c[0]]=v===''?null:v;});
    let res=isEdit?await sb.from(def.tbl).update(rec).eq("id",row.id):await sb.from(def.tbl).insert(rec);
    if(res.error){toast("Erro: "+res.error.message);return;}
    close();await loadAux();drawAuxTable();toast("Salvo.");
  };
}
async function baixarBackup(){
  const btn=$("#backup");btn.disabled=true;btn.textContent="Gerando…";
  const tabelas=["processos","recomendacoes","tratativas","observacoes",
    "aux_taxonomia","aux_ods","aux_lai_motivos","aux_servidores","aux_unidades",
    "aux_orgaos","aux_tipos_demanda","aux_tipos_documento","aux_status",
    "aux_predios","aux_tipos_tratativa"];
  const dump={gerado_em:new Date().toISOString(),sistema:"OGM · Controle de Processos",tabelas:{}};
  for(const t of tabelas){
    try{const {data}=await sb.from(t).select("*");dump.tabelas[t]=data||[];}
    catch(e){dump.tabelas[t]=[];}
  }
  const blob=new Blob([JSON.stringify(dump,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup-ogm-"+today()+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  btn.disabled=false;btn.textContent="⬇ Baixar backup";
  toast("Backup gerado. Salve o arquivo no Google Drive.");
}

async function popularSeed(){
  if(!confirm("Isso insere os dados iniciais (taxonomia, ODS, órgãos, servidores, unidades, tipos e situações) nas tabelas que estiverem vazias. Continuar?"))return;
  const btn=$("#seed");btn.disabled=true;btn.textContent="Populando…";
  const jobs=[
    ["aux_taxonomia",SEED.taxonomia],
    ["aux_ods",SEED.ods],
    ["aux_lai_motivos",SEED.lai_motivos],
    ["aux_servidores",SEED.servidores],
    ["aux_unidades",SEED.unidades],
    ["aux_orgaos",SEED.orgaos],
    ["aux_tipos_demanda",SEED.tipos_demanda.map(n=>({nome:n}))],
    ["aux_tipos_documento",SEED.tipos_documento.map(n=>({nome:n}))],
    ["aux_status",(SEED.status_desc||SEED.status.map(n=>({nome:n})))],
    ["aux_predios",SEED.predios||[]],
    ["aux_tipos_tratativa",(SEED.tipos_tratativa||[]).map(n=>({nome:n}))],
    ["aux_tipos_irregularidade",(SEED.tipos_irregularidade||[]).map(n=>({nome:n}))],
  ];
  let ok=0,err="";
  for(const [tbl,rowsData] of jobs){
    const {count}=await sb.from(tbl).select("*",{count:"exact",head:true});
    if(count && count>0)continue; // não duplica
    const {error}=await sb.from(tbl).insert(rowsData);
    if(error)err=error.message;else ok++;
  }
  await loadAux();
  btn.disabled=false;btn.textContent="Popular dados iniciais";
  toast(err?("Concluído com aviso: "+err):`Dados iniciais carregados (${ok} tabela(s)).`);
  drawAuxTable();
}

init();
</script>
